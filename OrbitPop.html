<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Pop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        .header {
            margin-top: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            color: #a6c1ee;
        }

        .back-link {
            color: #fbc2eb;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            transition: color 0.3s;
            margin-bottom: 5px;
        }

        .back-link:hover {
            color: #fff;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            margin-bottom: 15px;
            background: #1a252f;
            padding: 10px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            box-sizing: border-box;
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #13ff7c;
        }

        .level-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdf3f;
            display: flex;
            align-items: center;
        }

        .level-select {
            background: #2c3e50;
            color: #a6c1ee;
            border: 2px solid #34495e;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            margin-left: 15px;
            transition: border-color 0.2s;
        }

        .level-select:hover {
            border-color: #a6c1ee;
        }

        .level-select option {
            background: #1a252f;
            color: white;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #111820;
            border: 8px solid #34495e;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 10px;
        }

        .overlay h2 {
            font-size: 4rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(255,255,255,0.4);
        }

        .restart-btn {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 30px;
            color: #1a252f;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #8fa7d4, 0 15px 20px rgba(0,0,0,0.4);
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8fa7d4, 0 5px 10px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="gamedashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>Orbit Pop</h1>
    </div>

    <div class="scoreboard">
        <div class="score-text">SCORE: <span id="score-display">0</span></div>
        <div class="level-text">
            LEVEL <span id="level-display">1</span>
            <select id="level-selector" class="level-select" onchange="jumpToLevel(this.value)"></select>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="overlay" id="start-overlay">
            <h2 style="color: #ffdf3f;">Ready to Pop?</h2>
            <button class="restart-btn" onclick="startGame()">START GAME</button>
        </div>

        <div class="overlay" id="overlay" style="display: none;">
            <h2 id="overlay-title">Game Over</h2>
            <button class="restart-btn" id="overlay-btn" onclick="nextAction()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLORS = {
            red: '#ff4c4c',
            blue: '#3a9fff',
            green: '#13ff7c',
            yellow: '#ffdf3f',
            purple: '#e056fd'
        };
        const COLOR_KEYS = Object.keys(COLORS);

        let pathPoints = [];
        let marbles = [];
        let projectiles = [];
        let particles = [];
        let stars = [];
        
        // Initialize ambient background stars
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * 800,
                y: Math.random() * 600,
                size: Math.random() * 1.5 + 0.5,
                alpha: Math.random(),
                fadeSpeed: (Math.random() * 0.02 + 0.005) * (Math.random() > 0.5 ? 1 : -1),
                driftSpeed: Math.random() * 0.15 + 0.05
            });
        }
        
        let level = localStorage.getItem('orbitPopLevel') ? parseInt(localStorage.getItem('orbitPopLevel')) : 1;
        let maxLevel = localStorage.getItem('orbitPopMaxLevel') ? parseInt(localStorage.getItem('orbitPopMaxLevel')) : level;
        let score = 0;
        let ballsToSpawn = 0;
        let gameState = 'start'; // start, playing, won, lost
        
        let shooterAngle = 0;
        let currentMarbleColor = 'red';
        let nextMarbleColor = 'blue';
        let shootCooldown = 0;
        let recoil = 0;
        let comboMultiplier = 1;

        // --- Audio Context ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let bgmInterval = null;
        let bgmIndex = 0;
        const bgmNotes = [146.83, 174.61, 196.00, 220.00, 261.63, 220.00, 196.00, 174.61]; // D minor pentatonic

        function playSound(type, combo = 1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                // Main punchy body of the cannon (deep thwump)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.7, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                
                // Sharp transient click for impact (the crack of the launch)
                const clickOsc = audioCtx.createOscillator();
                const clickGain = audioCtx.createGain();
                clickOsc.type = 'sawtooth';
                clickOsc.frequency.setValueAtTime(1500, now);
                clickOsc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                clickGain.gain.setValueAtTime(0, now);
                clickGain.gain.linearRampToValueAtTime(0.4, now + 0.005);
                clickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                clickOsc.connect(clickGain);
                clickGain.connect(audioCtx.destination);
                
                clickOsc.start(now); clickOsc.stop(now + 0.05);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'pop') {
                let pitch = Math.min(2.5, 1 + (combo - 1) * 0.15); // Max 2.5x pitch
                
                // A satisfying, wet bubble-pop sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300 * pitch, now);
                osc.frequency.exponentialRampToValueAtTime(1200 * pitch, now + 0.08);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.8, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                
                // Add a sharp percussive click at the start
                const clickOsc = audioCtx.createOscillator();
                const clickGain = audioCtx.createGain();
                clickOsc.type = 'square';
                clickOsc.frequency.setValueAtTime(2000 * pitch, now);
                clickOsc.frequency.exponentialRampToValueAtTime(100 * pitch, now + 0.03);
                clickGain.gain.setValueAtTime(0, now);
                clickGain.gain.linearRampToValueAtTime(0.3, now + 0.005);
                clickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
                clickOsc.connect(clickGain);
                clickGain.connect(audioCtx.destination);
                clickOsc.start(now);
                clickOsc.stop(now + 0.03);

                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'thud') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.1);
                osc.frequency.setValueAtTime(600, now + 0.2);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.setValueAtTime(0.3, now + 0.4);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function startBGM() {
            if (bgmInterval) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            bgmInterval = setInterval(() => {
                if (gameState !== 'playing' && gameState !== 'losing') return;
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();
                
                osc.type = 'triangle';
                osc.frequency.value = bgmNotes[bgmIndex];
                
                filter.type = 'lowpass';
                filter.frequency.value = 600; // Muted, spacey tone
                
                gain.connect(filter);
                filter.connect(audioCtx.destination);
                osc.connect(gain);
                
                let now = audioCtx.currentTime;
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.04, now + 0.1); // Keep it quiet so SFX stand out
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                
                osc.start(now);
                osc.stop(now + 0.6);
                
                bgmIndex = (bgmIndex + 1) % bgmNotes.length;
            }, 350); // Speed of the background sequence
        }

        function stopBGM() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        // --- Setup Logic ---
        function initPath() {
            pathPoints = [];
            let cx = 400, cy = 300;
            
            // Maps cycle every 4 levels
            let mapType = (level - 1) % 4;
            
            // Progressive difficulty: more loops, tighter gaps
            let loops = 3.0 + Math.min(level * 0.2, 3.0); // max 6 loops
            let a = Math.PI * 2 * loops;
            
            // Base max radius we want to reach is ~260 (leaves room for edges)
            let maxAvailable = 260;
            let wobbleAmp = 0;
            let wobbleFreq = 0;
            let wobbleType = 0;

            if (mapType === 1) { // Wavy Map
                wobbleAmp = 12;
                wobbleFreq = 6;
                wobbleType = 1;
                maxAvailable -= wobbleAmp;
            } else if (mapType === 2) { // Square-ish Map
                wobbleAmp = 16;
                wobbleFreq = 4;
                wobbleType = 2;
                maxAvailable -= wobbleAmp;
            } else if (mapType === 3) { // Tri-lobe Map
                wobbleAmp = 16;
                wobbleFreq = 3;
                wobbleType = 1;
                maxAvailable -= wobbleAmp;
            }
            
            let b = (maxAvailable - 80) / a;
            // Prevent track lines from visually overlapping (min gap ~44 pixels)
            if (b < 7.0) { 
                b = 7.0;
                a = (maxAvailable - 80) / b;
            }
            
            function getPoint(angle) {
                let r = 80 + angle * b;
                
                if (wobbleType === 1) {
                    r += Math.sin(angle * wobbleFreq) * wobbleAmp;
                } else if (wobbleType === 2) {
                    r += Math.abs(Math.sin(angle * wobbleFreq)) * wobbleAmp;
                }
                
                return {
                    x: cx + r * Math.cos(angle),
                    y: cy + r * Math.sin(angle)
                };
            }

            pathPoints.push(getPoint(a));
            
            while (a > 0) {
                // Fixed small angle step to approximate derivative
                let da = 0.02; 
                let p1 = getPoint(a);
                let p2 = getPoint(a - da);
                let dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                
                // Step angle to move exactly ~1 pixel
                let step_da = da / dist;
                a -= step_da;
                
                if (a < 0) break;
                
                pathPoints.push(getPoint(a));
            }
        }

        function getLevelColor() {
            let maxColors = Math.min(3 + Math.floor((level - 1) / 2), 5);
            let pool = COLOR_KEYS.slice(0, maxColors);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function getShooterColor() {
            if (marbles.length > 0) {
                let colorsOnBoard = [...new Set(marbles.map(m => m.color))];
                return colorsOnBoard[Math.floor(Math.random() * colorsOnBoard.length)];
            }
            return getLevelColor(); // Fallback for when the board is completely empty at the start
        }

        function updateLevelSelector() {
            const selector = document.getElementById('level-selector');
            selector.innerHTML = '';
            for (let i = 1; i <= maxLevel; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = 'Jump to Level ' + i;
                if (i === level) opt.selected = true;
                selector.appendChild(opt);
            }
        }

        function jumpToLevel(levelVal) {
            let wasStart = (gameState === 'start');
            level = parseInt(levelVal);
            localStorage.setItem('orbitPopLevel', level);
            score = 0;
            document.getElementById('score-display').innerText = score;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('start-overlay').style.display = 'none';
            
            loadLevel();
            gameState = 'playing';
            startBGM();
            
            if (wasStart) {
                requestAnimationFrame(gameLoop);
            }
        }

        function loadLevel() {
            initPath();
            marbles = [];
            projectiles = [];
            particles = [];
            ballsToSpawn = 30 + (level * 10);
            currentMarbleColor = getLevelColor();
            nextMarbleColor = getLevelColor();
            comboMultiplier = 1;
            document.getElementById('level-display').innerText = level;
            updateLevelSelector();
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            score = 0;
            document.getElementById('score-display').innerText = score;
            loadLevel();
            gameState = 'playing';
            startBGM();
            requestAnimationFrame(gameLoop);
        }

        // --- Input Handling ---
        canvas.addEventListener('mousemove', e => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);
            shooterAngle = Math.atan2(my - 300, mx - 400);
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener('mousedown', (e) => {
            if (gameState !== 'playing') return;

            if (e.button === 2) {
                let temp = currentMarbleColor;
                currentMarbleColor = nextMarbleColor;
                nextMarbleColor = temp;
                playSound('thud');
                return;
            }

            if (e.button === 0 && shootCooldown <= 0) {
                comboMultiplier = 1; // Reset combo multiplier for the new shot sequence
                projectiles.push({
                    x: 400 + Math.cos(shooterAngle) * 25,
                    y: 300 + Math.sin(shooterAngle) * 25,
                    vx: Math.cos(shooterAngle) * 16,
                    vy: Math.sin(shooterAngle) * 16,
                    color: currentMarbleColor
                });
                createCannonSparks(shooterAngle, currentMarbleColor);
                currentMarbleColor = nextMarbleColor;
                nextMarbleColor = getShooterColor();
                shootCooldown = 15; // frames
                recoil = 12; // kickback amount
                playSound('shoot');
            }
        });

        // --- Game Mechanics ---
        function createPopParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: color,
                    life: 1.0,
                    fadeRate: 0.05,
                    size: 3 + Math.random() * 5
                });
            }
        }

        function createCannonSparks(angle, color) {
            let muzzleX = 400 + Math.cos(angle) * 50;
            let muzzleY = 300 + Math.sin(angle) * 50;
            for (let i = 0; i < 8; i++) {
                let spread = (Math.random() - 0.5) * 0.6;
                let speed = 4 + Math.random() * 8;
                particles.push({
                    x: muzzleX,
                    y: muzzleY,
                    vx: Math.cos(angle + spread) * speed,
                    vy: Math.sin(angle + spread) * speed,
                    color: color,
                    life: 0.8 + Math.random() * 0.4,
                    fadeRate: 0.05,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function createWinExplosion() {
            for (let i = 0; i < 200; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 15;
                particles.push({
                    x: 400,
                    y: 300,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)],
                    life: 1.0 + Math.random() * 0.5,
                    fadeRate: 0.015 + Math.random() * 0.01,
                    size: 4 + Math.random() * 8
                });
            }
        }

        function checkMatches(index) {
            if (index < 0 || index >= marbles.length) return;
            let color = marbles[index].color;
            let left = index, right = index;
            
            // Check backwards (higher indices)
            while(left < marbles.length - 1 && marbles[left+1].color === color && Math.abs(marbles[left+1].d - marbles[left].d) <= 35) {
                left++;
            }
            // Check forwards (lower indices)
            while(right > 0 && marbles[right-1].color === color && Math.abs(marbles[right-1].d - marbles[right].d) <= 35) {
                right--;
            }
            
            let count = left - right + 1;
            if(count >= 3) {
                for (let k = right; k <= left; k++) {
                    let m = marbles[k];
                    let pos = pathPoints[Math.floor(m.d)];
                    if (pos) createPopParticles(pos.x, pos.y, m.color);
                }
                marbles.splice(right, count);
                score += count * 10 * comboMultiplier;
                document.getElementById('score-display').innerText = score;
                playSound('pop', comboMultiplier);
                comboMultiplier++;
            } else {
                playSound('thud');
            }
        }

        function update() {
            // Keep updating existing particles universally
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // Add slight gravity to all particles for better effect
                p.life -= p.fadeRate || 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update ambient stars
            for (let s of stars) {
                s.alpha += s.fadeSpeed;
                if (s.alpha > 1) { s.alpha = 1; s.fadeSpeed *= -1; }
                else if (s.alpha < 0) { s.alpha = 0; s.fadeSpeed *= -1; }
                
                s.x -= s.driftSpeed;
                if (s.x < 0) {
                    s.x = 800;
                    s.y = Math.random() * 600;
                }
            }

            if (gameState === 'losing') {
                for (let i = marbles.length - 1; i >= 0; i--) {
                    marbles[i].d += 35.0; // Accelerate rapidly into the abyss
                    if (marbles[i].d >= pathPoints.length) {
                        marbles.splice(i, 1);
                    }
                }

                // Allow mid-air projectiles to fly off-screen
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    let p = projectiles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) {
                        projectiles.splice(i, 1);
                    }
                }
                
                if (marbles.length === 0) {
                    gameState = 'lost';
                    stopBGM();
                    showOverlay("Game Over", "#ff4c4c", "TRY AGAIN");
                }
                return;
            }

            if (gameState === 'won' || gameState === 'lost') {
                return;
            }

            if (shootCooldown > 0) shootCooldown--;
            if (recoil > 0) {
                recoil *= 0.8; // smoothly return to resting position
                if (recoil < 0.5) recoil = 0;
            }

            let pulling = new Array(marbles.length).fill(false);

            // 1. Identify magnetic pulls (Zuma snap mechanic)
            for (let i = 0; i < marbles.length - 1; i++) {
                let gap = marbles[i].d - marbles[i+1].d;
                if (gap > 29 && marbles[i].color === marbles[i+1].color) {
                    let pullSpeed = 8.0; // Faster magnetic snap
                    
                    marbles[i].d -= pullSpeed;
                    pulling[i] = true;
                    
                    // Pull everything physically attached in front of it backward too
                    for (let j = i - 1; j >= 0; j--) {
                        // Account for the fact that j+1 just moved backward by pullSpeed!
                        if (marbles[j].d <= marbles[j+1].d + pullSpeed + 29) {
                            marbles[j].d -= pullSpeed;
                            pulling[j] = true;
                        } else {
                            break;
                        }
                    }

                    // Check if they just physically snapped together this frame
                    if (marbles[i].d <= marbles[i+1].d + 30) {
                        marbles[i].d = marbles[i+1].d + 28;
                        marbles[i].needsMatchCheck = true;
                    }
                }
            }
            
            // 2. Move balls smoothly
            for (let i = 0; i < marbles.length; i++) {
                if (!pulling[i]) marbles[i].d += 0.6; // Base creeping speed
            }

            // Spawner pushes the chain
            if (ballsToSpawn > 0) {
                if (marbles.length === 0 || marbles[marbles.length - 1].d > 28) {
                    let newColor;
                    do {
                        newColor = getLevelColor();
                    } while (
                        marbles.length >= 2 &&
                        marbles[marbles.length - 1].color === newColor &&
                        marbles[marbles.length - 2].color === newColor
                    );
                    marbles.push({ d: 0, color: newColor });
                    ballsToSpawn--;
                } else {
                    marbles[marbles.length - 1].d += 1.2; // Extra push from the spawner
                }
            }

            // Resolve physical pushing (back balls push front balls)
            for(let i = marbles.length - 2; i >= 0; i--) {
                if (marbles[i].d < marbles[i+1].d + 28) {
                    marbles[i].d = marbles[i+1].d + 28;
                }
            }

            // Trigger combo matches if a magnetic snap just completed!
            for (let i = marbles.length - 1; i >= 0; i--) {
                if (marbles[i] && marbles[i].needsMatchCheck) {
                    marbles[i].needsMatchCheck = false;
                    checkMatches(i);
                }
            }

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) {
                    projectiles.splice(i, 1);
                    continue;
                }

                let hit = false;
                for (let m = 0; m < marbles.length; m++) {
                    let mb = marbles[m];
                    let pos = pathPoints[Math.floor(mb.d)];
                    if (!pos) continue;

                    if (Math.hypot(p.x - pos.x, p.y - pos.y) < 30) {
                        hit = true;
                        
                        // Figure out which side of the hit marble to insert into
                        let pos_f = pathPoints[Math.min(pathPoints.length - 1, Math.floor(mb.d + 14))] || pos;
                        let pos_b = pathPoints[Math.max(0, Math.floor(mb.d - 14))] || pos;
                        
                        let dist_f = Math.hypot(p.x - pos_f.x, p.y - pos_f.y);
                        let dist_b = Math.hypot(p.x - pos_b.x, p.y - pos_b.y);

                        let newObj = {d: mb.d, color: p.color};
                        if (dist_f < dist_b) {
                            newObj.d = mb.d + 28;
                            marbles.splice(m, 0, newObj);
                            checkMatches(m);
                        } else {
                            newObj.d = mb.d - 28;
                            marbles.splice(m + 1, 0, newObj);
                            checkMatches(m + 1);
                        }
                        break;
                    }
                }
                if (hit) projectiles.splice(i, 1);
            }

            // End Game Checks
            if (marbles.length > 0 && marbles[0].d >= pathPoints.length - 15) {
                gameState = 'losing';
            } else if (marbles.length === 0 && ballsToSpawn <= 0) {
                gameState = 'won';
                stopBGM();
                playSound('win');
                createWinExplosion();
                showOverlay("Level Cleared!", "#13ff7c", "NEXT LEVEL");
            }
        }

        function drawMarble(ctx, x, y, radius, colorHex) {
            // Base color
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = colorHex;
            ctx.fill();

            // Shadow gradient (dark edge)
            let shadowGrad = ctx.createRadialGradient(x - radius * 0.2, y - radius * 0.2, 0, x, y, radius);
            shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
            shadowGrad.addColorStop(0.7, 'rgba(0,0,0,0.1)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
            ctx.fillStyle = shadowGrad;
            ctx.fill();

            // Bright highlight (top left)
            let highlightGrad = ctx.createRadialGradient(x - radius * 0.35, y - radius * 0.35, 0, x - radius * 0.35, y - radius * 0.35, radius * 0.6);
            highlightGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
            highlightGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = highlightGrad;
            ctx.fill();

            // Secondary bounce light (bottom right)
            let bounceGrad = ctx.createRadialGradient(x + radius * 0.4, y + radius * 0.4, 0, x + radius * 0.4, y + radius * 0.4, radius * 0.5);
            bounceGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
            bounceGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = bounceGrad;
            ctx.fill();

            // Outline
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // Draw Ambient Stars
            ctx.fillStyle = '#ffffff';
            for (let s of stars) {
                ctx.globalAlpha = s.alpha;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; // Reset transparency for other elements

            if (pathPoints.length === 0) return;

            // Calculate Danger Level
            let dangerLevel = 0;
            if (marbles.length > 0 && (gameState === 'playing' || gameState === 'losing')) {
                let distToHole = pathPoints.length - marbles[0].d;
                let warningDistance = 350; // Increased from 200
                if (distToHole < warningDistance) {
                    dangerLevel = Math.max(0, 1 - (distToHole / warningDistance));
                }
            }
            let timeSec = Date.now() / 1000;
            // Slower base pulse, but ramps up much faster as danger increases
            let pulse = dangerLevel > 0 ? (Math.sin(timeSec * (6 + dangerLevel * 30)) + 1) / 2 : 0;

            // Draw Path Track
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            for(let i=0; i<pathPoints.length; i+=10) {
                let p = pathPoints[i];
                if (i===0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
        
        // Outer metallic rim
        ctx.lineWidth = 38;
        ctx.strokeStyle = '#2c3e50';
        ctx.stroke();

        // Inner dark groove where the marbles roll
        ctx.lineWidth = 30;
        ctx.strokeStyle = '#0a0f14';
        ctx.stroke();

            // Draw Sinkhole
            let endP = pathPoints[pathPoints.length - 1];
            
            // Outer metallic casing
            ctx.beginPath();
            ctx.arc(endP.x, endP.y, 36, 0, Math.PI * 2);
            let casingGrad = ctx.createLinearGradient(endP.x - 36, endP.y - 36, endP.x + 36, endP.y + 36);
            casingGrad.addColorStop(0, '#4a6278');
            casingGrad.addColorStop(0.5, '#2c3e50');
            casingGrad.addColorStop(1, '#0f171e');
            ctx.fillStyle = casingGrad;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#1a252f';
            ctx.stroke();

            // Danger indicator ring
            ctx.beginPath();
            ctx.arc(endP.x, endP.y, 28, 0, Math.PI * 2);
            ctx.fillStyle = '#111820';
            ctx.fill();
            ctx.lineWidth = 3;
            
            ctx.shadowBlur = 15 + (dangerLevel * pulse * 25);
            ctx.shadowColor = dangerLevel > 0 ? '#ff0000' : '#ff4c4c';
            
            let ringAlpha = dangerLevel > 0 ? 0.5 + (pulse * 0.5) : 1;
            ctx.strokeStyle = dangerLevel > 0 ? `rgba(255, 0, 0, ${ringAlpha})` : '#ff4c4c';
            
            ctx.stroke();
            ctx.shadowBlur = 0; // reset

            // The Abyss
            ctx.beginPath();
            ctx.arc(endP.x, endP.y, 25, 0, Math.PI * 2);
            let abyssGrad = ctx.createRadialGradient(endP.x, endP.y, 2, endP.x, endP.y, 25);
            abyssGrad.addColorStop(0, '#000000');
            abyssGrad.addColorStop(0.6, '#05080a');
            abyssGrad.addColorStop(1, '#4a0000');
            ctx.fillStyle = abyssGrad;
            ctx.fill();

            // Inner depth shadow
            ctx.beginPath();
            ctx.arc(endP.x, endP.y, 25, 0, Math.PI * 2);
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.stroke();

            // Draw Marbles
            for (let m of marbles) {
                let idx = Math.floor(m.d);
                if (idx >= pathPoints.length) idx = pathPoints.length - 1;
                let p = pathPoints[idx];
                if (!p) continue;
                
                let radius = 15;
                if (m.d > pathPoints.length - 60) {
                    radius = Math.max(0, 15 * ((pathPoints.length - m.d) / 60)); // Shrink as they fall in
                }
                
                if (radius > 0.5) {
                    drawMarble(ctx, p.x, p.y, radius, COLORS[m.color]);
                }
            }

            // Draw Particles
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = COLORS[p.color];
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; // Reset transparency for other elements

            // Draw Start Tunnel (covers spawning balls)
            let startP = pathPoints[0];
            let nextP = pathPoints[10] || pathPoints[pathPoints.length - 1];
            let angle = Math.atan2(nextP.y - startP.y, nextP.x - startP.x);

            ctx.save();
            ctx.translate(startP.x, startP.y);
            ctx.rotate(angle);

            // Shift forward so a ball at startP (d=0) is perfectly hidden inside the tunnel
            ctx.translate(20, 0);

            // Dark shadow casting OUT of the tunnel onto the track and marbles
            let shadowGrad = ctx.createLinearGradient(0, 0, 45, 0);
            shadowGrad.addColorStop(0, 'rgba(0,0,0,0.9)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.arc(5, 0, 40, -Math.PI/2, Math.PI/2);
            ctx.fill();

            // Main Tunnel Body (an arched metallic dome)
            ctx.beginPath();
            ctx.ellipse(0, 0, 12, 36, 0, -Math.PI/2, Math.PI/2);
            ctx.lineTo(-60, 36);
            ctx.lineTo(-60, -36);
            ctx.closePath();
            
            let tunnelGrad = ctx.createLinearGradient(-60, -36, 12, 36);
            tunnelGrad.addColorStop(0, '#1a252f');
            tunnelGrad.addColorStop(0.5, '#4a6278');
            tunnelGrad.addColorStop(1, '#0f171e');
            ctx.fillStyle = tunnelGrad;
            ctx.fill();
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#1a252f';
            ctx.stroke();

            // Structural ribs on the tunnel roof
            ctx.beginPath();
            ctx.moveTo(-15, -36); ctx.lineTo(-15, 36);
            ctx.moveTo(-35, -36); ctx.lineTo(-35, 36);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#1a252f';
            ctx.stroke();

            // Neon glowing arch at the exit edge
            ctx.beginPath();
            ctx.ellipse(0, 0, 12, 36, 0, -Math.PI/2, Math.PI/2);
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#13ff7c';
            ctx.strokeStyle = '#13ff7c';
            ctx.stroke();
            ctx.shadowBlur = 0; // reset
            
            // Solid metallic edge on the arch
            ctx.beginPath();
            ctx.ellipse(0, 0, 12, 36, 0, -Math.PI/2, Math.PI/2);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ecf0f1';
            ctx.stroke();

            ctx.restore();

            // Draw Projectiles
            for (let p of projectiles) {
                drawMarble(ctx, p.x, p.y, 15, COLORS[p.color]);
            }

            // Draw Shooter Turret
            ctx.save();
            ctx.translate(400, 300);
            ctx.rotate(shooterAngle);
            
            ctx.save();
            ctx.translate(-recoil, 0); // Apply recoil pushback

            // Barrel Shadow / Under-layer
            ctx.fillStyle = '#1a252f';
            ctx.fillRect(10, -16, 45, 32);
            
            // Barrel Main Cylinder Gradient
            let barrelGrad = ctx.createLinearGradient(0, -14, 0, 14);
            barrelGrad.addColorStop(0, '#7f8c8d');
            barrelGrad.addColorStop(0.3, '#ecf0f1');
            barrelGrad.addColorStop(1, '#2c3e50');
            ctx.fillStyle = barrelGrad;
            ctx.fillRect(10, -14, 42, 28);
            
            // Barrel Accents/Rings
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(20, -15, 6, 30); // Middle band
            ctx.fillRect(42, -15, 8, 30); // End band

            // Barrel Muzzle Opening (Dark indent)
            ctx.fillStyle = '#0a0f14';
            ctx.fillRect(50, -10, 3, 20);
            
            ctx.restore(); // reset translation for base

            // Base Mount
            ctx.beginPath();
            ctx.arc(0, 0, 32, 0, Math.PI*2);
            let baseGrad = ctx.createRadialGradient(-10, -10, 5, 0, 0, 32);
            baseGrad.addColorStop(0, '#5c7a96');
            baseGrad.addColorStop(0.6, '#2c3e50');
            baseGrad.addColorStop(1, '#0f171e');
            ctx.fillStyle = baseGrad;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#111820';
            ctx.stroke();

            // Inner Loading Bay Socket
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI*2);
            ctx.fillStyle = '#0a0f14';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#4a6278';
            ctx.stroke();

            // Loaded Marble
            drawMarble(ctx, 0, 0, 15, COLORS[currentMarbleColor]);
            
            ctx.restore();

            // Next Marble Indicator Socket
            ctx.beginPath();
            ctx.arc(380, 280, 12, 0, Math.PI*2);
            ctx.fillStyle = '#1a252f';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#2c3e50';
            ctx.stroke();
            drawMarble(ctx, 380, 280, 8, COLORS[nextMarbleColor]);

            // Danger Vignette Overlay
            if (dangerLevel > 0) {
                let grad = ctx.createRadialGradient(400, 300, 250, 400, 300, 600);
                grad.addColorStop(0, 'rgba(255, 0, 0, 0)'); // Center is transparent
                grad.addColorStop(1, `rgba(255, 0, 0, ${dangerLevel * pulse * 0.25})`); // Softer, less intense red pulse at the edges
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 800, 600);
                
                ctx.textAlign = 'center';
                ctx.font = '900 32px "Segoe UI"';
                ctx.fillStyle = `rgba(255, 76, 76, ${pulse * 0.5 + 0.3})`; // Less aggressive flashing on the text
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff0000';
                ctx.fillText("WARNING!", 400, 50);
                ctx.shadowBlur = 0; // reset
            }
        }

        function showOverlay(title, color, btnText) {
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-title').style.color = color;
            document.getElementById('overlay-btn').innerText = btnText;
            document.getElementById('overlay').style.display = 'flex';
        }

        function nextAction() {
            document.getElementById('overlay').style.display = 'none';
            if (gameState === 'won') {
                level++;
                maxLevel = Math.max(maxLevel, level);
                localStorage.setItem('orbitPopLevel', level);
                localStorage.setItem('orbitPopMaxLevel', maxLevel);
                loadLevel();
            } else {
                score = 0;
                document.getElementById('score-display').innerText = score;
                loadLevel();
            }
            gameState = 'playing';
            startBGM();
        }

        function gameLoop() {
            if (gameState !== 'start') {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('level-display').innerText = level;
        updateLevelSelector();
    </script>
</body>
</html>
