<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #101820;
            --panel: rgba(255, 255, 255, 0.08);
            --panel-strong: rgba(255, 255, 255, 0.13);
            --ink: #ffffff;
            --muted: rgba(255, 255, 255, 0.68);
            --line: rgba(255, 255, 255, 0.16);
            --green: #2dfc8f;
            --red: #ff5a76;
            --yellow: #ffd166;
            --blue: #4dabff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 15%, rgba(45, 252, 143, 0.22), transparent 23rem),
                radial-gradient(circle at 82% 16%, rgba(77, 171, 255, 0.24), transparent 24rem),
                radial-gradient(circle at 50% 92%, rgba(255, 209, 102, 0.18), transparent 25rem),
                linear-gradient(135deg, #101820 0%, #192532 52%, #101820 100%);
            color: var(--ink);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
            background-size: 54px 54px;
            mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
            animation: panGrid 60s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.34) 100%);
        }

        .page {
            width: min(1180px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding: 22px clamp(16px, 4vw, 40px) 32px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: clamp(18px, 3vw, 28px);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .back-link {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 15px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.07);
            color: var(--ink);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 800;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.20);
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .back-link:hover,
        .back-link:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.34);
            background: rgba(255, 255, 255, 0.14);
            outline: none;
        }

        .status-pill {
            min-height: 42px;
            max-width: min(520px, 62vw);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.13);
            background: rgba(0, 0, 0, 0.26);
            color: var(--muted);
            font-weight: 700;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 0.88fr) minmax(420px, 1.12fr);
            align-items: center;
            gap: clamp(22px, 5vw, 58px);
        }

        .info-panel {
            display: grid;
            gap: 22px;
            align-content: center;
        }

        .eyebrow {
            margin: 0;
            color: var(--yellow);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: #fff;
            font-size: clamp(3rem, 8vw, 7rem);
            line-height: 0.86;
            font-weight: 950;
            letter-spacing: 0;
            text-shadow:
                0 0 24px rgba(77, 171, 255, 0.30),
                0 18px 50px rgba(0, 0, 0, 0.46);
        }

        .subtitle {
            max-width: 52ch;
            margin: 0;
            color: var(--muted);
            font-size: clamp(1rem, 2vw, 1.18rem);
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-card {
            min-height: 88px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.20);
        }

        .stat-label {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .stat-value {
            display: block;
            margin-top: 8px;
            color: #fff;
            font-size: clamp(1.45rem, 3vw, 2.2rem);
            line-height: 1;
            font-weight: 950;
        }

        .difficulty-card {
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.045));
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.20);
        }

        .difficulty-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .difficulty-title {
            color: #fff;
            font-size: 0.86rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .diff-btn {
            min-height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.24);
            color: rgba(255, 255, 255, 0.78);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 950;
            transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
        }

        .diff-btn:hover:not(:disabled),
        .diff-btn:focus-visible:not(:disabled) {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.38);
            color: #fff;
            outline: none;
        }

        .diff-btn.active {
            background: linear-gradient(135deg, rgba(77, 171, 255, 0.86), rgba(45, 252, 143, 0.78));
            color: #06111a;
            border-color: transparent;
            box-shadow: 0 0 24px rgba(77, 171, 255, 0.28);
        }

        .diff-btn:disabled {
            opacity: 0.52;
            cursor: not-allowed;
        }

        .stage {
            position: relative;
            min-height: min(640px, 74vh);
            display: grid;
            place-items: center;
        }

        .stage::before,
        .stage::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .stage::before {
            width: min(620px, 92vw);
            aspect-ratio: 1;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                0 0 0 28px rgba(255, 255, 255, 0.025),
                0 0 90px rgba(77, 171, 255, 0.18);
            animation: breathe 4s ease-in-out infinite;
        }

        .stage::after {
            width: min(500px, 78vw);
            aspect-ratio: 1;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 64%);
            filter: blur(18px);
            opacity: 0.72;
            transform: translateY(20px);
        }

        .game-board {
            --board-size: min(500px, 82vw);
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            padding: clamp(14px, 3vw, 24px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(12px, 3vw, 22px);
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%, #172330 0 27%, transparent 28%),
                linear-gradient(145deg, #263746, #111923);
            border: 1px solid rgba(255, 255, 255, 0.17);
            box-shadow:
                0 42px 90px rgba(0, 0, 0, 0.48),
                inset 0 0 0 11px rgba(255, 255, 255, 0.035),
                inset 0 -24px 44px rgba(0, 0, 0, 0.42);
            z-index: 1;
            transition: box-shadow 220ms ease;
        }

        #ripple-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .game-board::before {
            content: "";
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background:
                conic-gradient(from 90deg, rgba(45, 252, 143, 0.30), rgba(255, 90, 118, 0.30), rgba(77, 171, 255, 0.30), rgba(255, 209, 102, 0.30), rgba(45, 252, 143, 0.30));
            filter: blur(16px);
            opacity: 0.38;
            z-index: -1;
        }

        .simon-btn {
            position: relative;
            cursor: pointer;
            border: 0;
            overflow: hidden;
            touch-action: manipulation;
            transition: transform 100ms ease, filter 100ms ease, box-shadow 100ms ease;
            box-shadow:
                inset 10px 12px 22px rgba(255, 255, 255, 0.16),
                inset -16px -18px 28px rgba(0, 0, 0, 0.32),
                0 14px 30px rgba(0, 0, 0, 0.22);
        }

        .simon-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.54), transparent 16%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 48%);
            opacity: 0.76;
        }

        .simon-btn::after {
            content: "";
            position: absolute;
            inset: 10%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            opacity: 0.5;
        }

        .simon-btn.green {
            border-top-left-radius: 100%;
            background: radial-gradient(circle at 32% 30%, #7effbd, var(--green) 44%, #008e4d 100%);
        }

        .simon-btn.red {
            border-top-right-radius: 100%;
            background: radial-gradient(circle at 68% 30%, #ff9bab, var(--red) 42%, #9e1430 100%);
        }

        .simon-btn.yellow {
            border-bottom-left-radius: 100%;
            background: radial-gradient(circle at 32% 70%, #fff2a8, var(--yellow) 44%, #b17600 100%);
        }

        .simon-btn.blue {
            border-bottom-right-radius: 100%;
            background: radial-gradient(circle at 70% 72%, #9ed2ff, var(--blue) 45%, #005ca8 100%);
        }

        .simon-btn.green::after { border-top-left-radius: 100%; }
        .simon-btn.red::after { border-top-right-radius: 100%; }
        .simon-btn.yellow::after { border-bottom-left-radius: 100%; }
        .simon-btn.blue::after { border-bottom-right-radius: 100%; }

        .simon-btn.active {
            filter: brightness(1.32) saturate(1.32);
            transform: translateY(-3px) scale(1.018);
            z-index: 10;
        }

        .simon-btn.green.active { box-shadow: 0 0 50px rgba(45, 252, 143, 1), 0 0 100px rgba(45, 252, 143, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.7); }
        .simon-btn.red.active { box-shadow: 0 0 50px rgba(255, 90, 118, 1), 0 0 100px rgba(255, 90, 118, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.7); }
        .simon-btn.yellow.active { box-shadow: 0 0 50px rgba(255, 209, 102, 1), 0 0 100px rgba(255, 209, 102, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.7); }
        .simon-btn.blue.active { box-shadow: 0 0 50px rgba(77, 171, 255, 1), 0 0 100px rgba(77, 171, 255, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.7); }

        .simon-btn:active {
            transform: translateY(2px) scale(0.99);
            filter: brightness(0.9);
        }

        .game-board.unclickable .simon-btn {
            pointer-events: none;
        }

        .center-console {
            position: absolute;
            top: 50%;
            left: 50%;
            width: clamp(142px, 28vw, 178px);
            height: clamp(142px, 28vw, 178px);
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.15), rgba(0, 0, 0, 0.6) 80%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 20px 42px rgba(0, 0, 0, 0.56),
                inset 0 0 28px rgba(0, 0, 0, 0.72),
                inset 0 1px 0 rgba(255, 255, 255, 0.10);
            z-index: 20;
        }

        #console-display {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #display-level-text {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 950;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        #display-level-num {
            color: #fff;
            font-family: "Courier New", Courier, monospace;
            font-size: clamp(3rem, 8vw, 4.7rem);
            line-height: 0.9;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(77, 171, 255, 0.9), 0 0 25px rgba(77, 171, 255, 0.5), 0 0 40px rgba(77, 171, 255, 0.3);
        }

        .start-btn {
            width: clamp(98px, 19vw, 122px);
            height: clamp(98px, 19vw, 122px);
            border: 0;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.80), transparent 22%),
                linear-gradient(135deg, #ffd166, #2dfc8f 54%, #4dabff);
            color: #06111a;
            cursor: pointer;
            font-size: clamp(0.95rem, 2.8vw, 1.18rem);
            font-weight: 950;
            letter-spacing: 0.08em;
            box-shadow:
                0 10px 0 #0e6e79,
                0 22px 38px rgba(0, 0, 0, 0.46);
            transition: transform 110ms ease, box-shadow 110ms ease, filter 110ms ease;
            animation: pulseStart 2.5s infinite alternate ease-in-out;
        }

        .start-btn:hover,
        .start-btn:focus-visible {
            filter: brightness(1.08) saturate(1.12);
            animation: none;
            outline: none;
        }

        .start-btn:active {
            transform: translateY(7px);
            box-shadow:
                0 3px 0 #0e6e79,
                0 10px 18px rgba(0, 0, 0, 0.42);
        }

        .game-board.game-over-effect {
            animation: errorShake 0.5s ease both;
            box-shadow:
                0 42px 90px rgba(0, 0, 0, 0.48),
                0 0 80px rgba(255, 90, 118, 0.58),
                inset 0 0 0 11px rgba(255, 90, 118, 0.10),
                inset 0 -24px 44px rgba(0, 0, 0, 0.42);
        }

        .game-board.level-clear {
            animation: clearPulse 0.6s ease-out both;
            border-color: rgba(45, 252, 143, 0.8);
            box-shadow:
                0 42px 90px rgba(0, 0, 0, 0.48),
                0 0 80px rgba(45, 252, 143, 0.3),
                inset 0 0 0 11px rgba(45, 252, 143, 0.2),
                inset 0 -24px 44px rgba(0, 0, 0, 0.42);
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: clamp(142px, 28vw, 178px); /* Match center console size */
            height: clamp(142px, 28vw, 178px);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            border: 3px solid var(--green);
            animation: ripple-effect 0.8s ease-out forwards;
        }

        @keyframes ripple-effect {
            to { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.72; }
            50% { transform: scale(1.025); opacity: 1; }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes clearPulse {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.03); }
        }

        @keyframes panGrid {
            0% { background-position: 0 0; }
            100% { background-position: 54px 54px; }
        }

        @keyframes pulseStart {
            0% { transform: scale(1); }
            100% { transform: scale(1.04); box-shadow: 0 10px 0 #0e6e79, 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 30px rgba(45, 252, 143, 0.3); }
        }

        @media (max-width: 940px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .info-panel {
                text-align: center;
            }

            .subtitle {
                margin-inline: auto;
            }
        }

        @media (max-width: 620px) {
            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .status-pill {
                max-width: none;
            }

            .stats,
            .difficulty-selector {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .stage {
                min-height: 430px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <a href="gamedashboard.html" class="back-link">&larr; Dashboard</a>
            <div class="status-pill" id="status-text">Choose a difficulty, then press start.</div>
        </header>

        <section class="hero" aria-label="Simon Says game">
            <div class="info-panel">
                <p class="eyebrow">Memory Arcade</p>
                <h1 id="level-title">Simon Says</h1>
                <p class="subtitle">Watch the glow sequence, repeat it back, and keep your streak alive as the tempo climbs.</p>

                <div class="stats" aria-label="Game stats">
                    <div class="stat-card">
                        <span class="stat-label">Level</span>
                        <span class="stat-value" id="stat-level">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Best</span>
                        <span class="stat-value" id="stat-best">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Mode</span>
                        <span class="stat-value" id="stat-mode">MED</span>
                    </div>
                </div>

                <div class="difficulty-card">
                    <div class="difficulty-header">
                        <span class="difficulty-title">Difficulty</span>
                    </div>
                    <div class="difficulty-selector" id="difficulty-selector">
                        <button class="diff-btn" data-diff="easy">EASY</button>
                        <button class="diff-btn active" data-diff="medium">MEDIUM</button>
                        <button class="diff-btn" data-diff="hard">HARD</button>
                        <button class="diff-btn" data-diff="impossible">IMPOSSIBLE</button>
                    </div>
                </div>
            </div>

            <div class="stage">
                <div id="ripple-container"></div>
                <div class="game-board">
                    <button class="simon-btn green" id="green" aria-label="Green"></button>
                    <button class="simon-btn red" id="red" aria-label="Red"></button>
                    <button class="simon-btn yellow" id="yellow" aria-label="Yellow"></button>
                    <button class="simon-btn blue" id="blue" aria-label="Blue"></button>

                    <div class="center-console">
                        <div id="console-display">
                            <span id="display-level-text">LVL</span>
                            <span id="display-level-num">0</span>
                        </div>
                        <button class="start-btn" id="start-btn">START</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const buttonColors = ["green", "red", "yellow", "blue"];
        const difficultyLabels = {
            easy: "EASY",
            medium: "MED",
            hard: "HARD",
            impossible: "IMP"
        };

        let gamePattern = [];
        let userClickedPattern = [];
        let started = false;
        let level = 0;
        let bestLevel = Number(localStorage.getItem("simonBestLevel") || 0);
        let isPlayingSequence = false;
        let currentDifficulty = "medium";

        const board = document.querySelector(".game-board");
        const startButton = document.getElementById("start-btn");
        const consoleDisplay = document.getElementById("console-display");
        const statusText = document.getElementById("status-text");
        const levelTitle = document.getElementById("level-title");
        const displayLevelNum = document.getElementById("display-level-num");
        const statLevel = document.getElementById("stat-level");
        const statBest = document.getElementById("stat-best");
        const statMode = document.getElementById("stat-mode");

        statBest.innerText = bestLevel;

        document.querySelectorAll(".diff-btn").forEach(btn => {
            btn.addEventListener("pointerdown", (e) => {
                e.preventDefault();
                if (started) return;
                document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
                e.target.classList.add("active");
                currentDifficulty = e.target.dataset.diff;
                statMode.innerText = difficultyLabels[currentDifficulty];
                statusText.innerText = `${difficultyLabels[currentDifficulty]} mode armed. Press start.`;
            });
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = { green: 415.3, red: 311.1, yellow: 254.3, blue: 207.7 };

        function playSound(color, duration = 300) {
            if (audioCtx.state === "suspended") audioCtx.resume();

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const timeInSeconds = duration / 1000;

            if (color === "wrong") {
                osc1.type = "sawtooth";
                osc2.type = "square";
                osc1.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc2.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc2.detune.setValueAtTime(15, audioCtx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + timeInSeconds);
                osc2.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + timeInSeconds);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeInSeconds);
            } else {
                osc1.type = "triangle";
                osc2.type = "sine";
                osc1.frequency.setValueAtTime(frequencies[color], audioCtx.currentTime);
                osc2.frequency.setValueAtTime(frequencies[color], audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.015);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeInSeconds);
            }

            osc1.start(audioCtx.currentTime);
            osc2.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + timeInSeconds);
            osc2.stop(audioCtx.currentTime + timeInSeconds);
        }

        function animatePress(currentColor, duration = 300) {
            const btn = document.getElementById(currentColor);
            btn.classList.add("active");
            setTimeout(() => btn.classList.remove("active"), duration);
        }

        function updateLevelDisplays() {
            displayLevelNum.innerText = level;
            statLevel.innerText = level;
            statBest.innerText = bestLevel;
            statMode.innerText = difficultyLabels[currentDifficulty];
        }

        function nextSequence() {
            userClickedPattern = [];
            level++;
            levelTitle.innerText = "Simon Says";
            updateLevelDisplays();
            statusText.innerText = `Level ${level}: watch closely.`;

            const randomChosenColor = buttonColors[Math.floor(Math.random() * 4)];
            gamePattern.push(randomChosenColor);

            playFullSequence();
        }

        function playFullSequence() {
            isPlayingSequence = true;
            board.classList.add("unclickable");
            let i = 0;

            let baseSpeed, speedDecrease, minSpeed;
            switch(currentDifficulty) {
                case "easy":
                    baseSpeed = 1000; speedDecrease = 30; minSpeed = 400; break;
                case "hard":
                    baseSpeed = 600; speedDecrease = 70; minSpeed = 150; break;
                case "impossible":
                    baseSpeed = 500; speedDecrease = 85; minSpeed = 100; break;
                case "medium":
                default:
                    baseSpeed = 800; speedDecrease = 50; minSpeed = 250; break;
            }

            const intervalSpeed = Math.max(minSpeed, baseSpeed - (level * speedDecrease));
            const activeTime = Math.min(300, intervalSpeed - 50);

            setTimeout(() => {
                const intervalId = setInterval(() => {
                    playSound(gamePattern[i], activeTime);
                    animatePress(gamePattern[i], activeTime);
                    i++;

                    if (i >= gamePattern.length) {
                        clearInterval(intervalId);
                        isPlayingSequence = false;
                        board.classList.remove("unclickable");
                        statusText.innerText = `Your turn. Repeat ${gamePattern.length} ${gamePattern.length === 1 ? "signal" : "signals"}.`;
                    }
                }, intervalSpeed);
            }, 500);
        }

        function markLevelClear() {
            board.classList.add("level-clear");

            const rippleContainer = document.getElementById('ripple-container');
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            rippleContainer.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);

            setTimeout(() => board.classList.remove("level-clear"), 580);
        }

        function checkAnswer(currentLevel) {
            if (gamePattern[currentLevel] === userClickedPattern[currentLevel]) {
                statusText.innerText = `${userClickedPattern.length}/${gamePattern.length} correct`;
                if (userClickedPattern.length === gamePattern.length) {
                    bestLevel = Math.max(bestLevel, level);
                    localStorage.setItem("simonBestLevel", String(bestLevel));
                    updateLevelDisplays();
                    markLevelClear();

                    statusText.innerText = "Clean run. Next sequence incoming.";

                    isPlayingSequence = true;
                    board.classList.add("unclickable");
                    setTimeout(nextSequence, 1000);
                }
            } else {
                playSound("wrong", 500);
                levelTitle.innerText = "Game Over";
                statusText.innerText = `You reached level ${level}. Press start to run it back.`;
                board.classList.add("game-over-effect");
                setTimeout(() => board.classList.remove("game-over-effect"), 500);
                startButton.style.display = "block";
                consoleDisplay.style.display = "none";
                startOver();
            }
        }

        function startOver() {
            level = 0;
            gamePattern = [];
            started = false;
            isPlayingSequence = false;
            updateLevelDisplays();
            board.classList.remove("unclickable");
            document.querySelectorAll(".diff-btn").forEach(btn => btn.disabled = false);
        }

        document.querySelectorAll(".simon-btn").forEach(btn => {
            btn.addEventListener("pointerdown", function(e) {
                e.preventDefault();
                if (!started || isPlayingSequence) return;

                const userChosenColor = this.id;
                userClickedPattern.push(userChosenColor);

                playSound(userChosenColor, 300);
                animatePress(userChosenColor, 300);

                checkAnswer(userClickedPattern.length - 1);
            });
        });

        startButton.addEventListener("pointerdown", function(e) {
            e.preventDefault();
            if (!started) {
                startButton.style.display = "none";
                consoleDisplay.style.display = "flex";
                started = true;
                levelTitle.innerText = "Simon Says";
                statusText.innerText = "Booting sequence...";
                document.querySelectorAll(".diff-btn").forEach(btn => btn.disabled = true);
                nextSequence();
            }
        });
    </script>
</body>
</html>
