<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1), 0 6px 12px rgba(0,0,0,0.6);
            transition: color 0.3s;
        }

        .back-link {
            color: #a6c1ee;
            text-decoration: none;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: inline-block;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fbc2eb;
        }

        .game-board {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #0f171e;
            border-radius: 50%;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border: 12px solid #34495e;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9);
        }

        .simon-btn {
            cursor: pointer;
            border: none;
            position: relative;
            transition: all 0.1s;
            box-shadow: inset -8px -8px 20px rgba(0,0,0,0.4), inset 8px 8px 20px rgba(255,255,255,0.2);
        }

        /* Button Shapes and 3D Gradients */
        .simon-btn.green { background: radial-gradient(circle at 30% 30%, #00d25b, #007a33); border-top-left-radius: 100%; }
        .simon-btn.red { background: radial-gradient(circle at 70% 30%, #ff4c4c, #8a0b12); border-top-right-radius: 100%; }
        .simon-btn.yellow { background: radial-gradient(circle at 30% 70%, #ffdf3f, #a88800); border-bottom-left-radius: 100%; }
        .simon-btn.blue { background: radial-gradient(circle at 70% 70%, #3a9fff, #053366); border-bottom-right-radius: 100%; }

        /* Super Bright Active/Blink States */
        .simon-btn.green.active { background: #13ff7c; box-shadow: 0 0 40px #13ff7c, inset 0 0 20px rgba(255,255,255,0.8); z-index: 10; }
        .simon-btn.red.active { background: #ff4c4c; box-shadow: 0 0 40px #ff4c4c, inset 0 0 20px rgba(255,255,255,0.8); z-index: 10; }
        .simon-btn.yellow.active { background: #fed93f; box-shadow: 0 0 40px #fed93f, inset 0 0 20px rgba(255,255,255,0.8); z-index: 10; }
        .simon-btn.blue.active { background: #1c8cff; box-shadow: 0 0 40px #1c8cff, inset 0 0 20px rgba(255,255,255,0.8); z-index: 10; }

        /* Button click feedback */
        .simon-btn:active {
            transform: scale(0.95);
        }

        .center-console {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at center, #2c3e50, #1a252f);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 5px 10px rgba(255,255,255,0.1);
            border: 15px solid #0f171e;
            z-index: 20;
        }

        .start-btn {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 1px;
            border-radius: 30px;
            color: #1a252f;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #8fa7d4, 0 15px 20px rgba(0,0,0,0.4);
            transform: translateY(-4px);
        }

        .start-btn:hover {
            filter: brightness(1.1);
        }
        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #8fa7d4, 0 5px 10px rgba(0,0,0,0.4);
        }

        .game-over-effect {
            animation: shake 0.5s;
            background-color: #9f0f17;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="gamedashboard.html" class="back-link">← Back to Dashboard</a>
        <h1 id="level-title">Simon Says</h1>
    </div>

    <div class="game-board">
        <div class="simon-btn green" id="green"></div>
        <div class="simon-btn red" id="red"></div>
        <div class="simon-btn yellow" id="yellow"></div>
        <div class="simon-btn blue" id="blue"></div>
        
        <div class="center-console">
            <button class="start-btn" id="start-btn">START</button>
        </div>
    </div>

    <script>
        const buttonColors = ["green", "red", "yellow", "blue"];
        let gamePattern = [];
        let userClickedPattern = [];
        let started = false;
        let level = 0;
        let isPlayingSequence = false; // Prevent clicks while playing pattern

        // Setup Audio Context for high-performance synthesized arcade sounds
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = { green: 415.3, red: 311.1, yellow: 254.3, blue: 207.7 };

        function playSound(color, duration = 300) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const timeInSeconds = duration / 1000;

            if (color === 'wrong') {
                osc1.type = 'sawtooth';
                osc2.type = 'square';
                osc1.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc2.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc2.detune.setValueAtTime(15, audioCtx.currentTime); // Slight dissonance for error
                // Satisfying power-down pitch drop effect
                osc1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + timeInSeconds);
                osc2.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + timeInSeconds);
                
                // Error sound envelope
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeInSeconds);
            } else {
                // Modern, satisfying plucky marimba/synth (Triangle + Sine)
                osc1.type = 'triangle';
                osc2.type = 'sine';
                osc1.frequency.setValueAtTime(frequencies[color], audioCtx.currentTime);
                osc2.frequency.setValueAtTime(frequencies[color], audioCtx.currentTime);

                // Plucky, percussive envelope for a very satisfying "tap"
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.015); // Instant punch
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeInSeconds); // Smooth acoustic fade
            }

            osc1.start(audioCtx.currentTime);
            osc2.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + timeInSeconds);
            osc2.stop(audioCtx.currentTime + timeInSeconds);
        }

        function animatePress(currentColor, duration = 300) {
            const btn = document.getElementById(currentColor);
            btn.classList.add("active");
            setTimeout(() => btn.classList.remove("active"), duration);
        }

        function nextSequence() {
            userClickedPattern = [];
            level++;
            document.getElementById("level-title").innerText = "Level " + level;

            const randomChosenColor = buttonColors[Math.floor(Math.random() * 4)];
            gamePattern.push(randomChosenColor);

            playFullSequence();
        }

        function playFullSequence() {
            isPlayingSequence = true;
            let i = 0;
            
            // Calculate speed (gets faster as level increases)
            // Base speed 800ms, decreases by 50ms per level, minimum 250ms
            const intervalSpeed = Math.max(250, 800 - (level * 50));
            
            // Calculate visual/audio duration to prevent overlap at fast speeds
            const activeTime = Math.min(300, intervalSpeed - 50);

            setTimeout(() => {
                const intervalId = setInterval(() => {
                    playSound(gamePattern[i], activeTime);
                    animatePress(gamePattern[i], activeTime);
                    i++;
                    
                    if (i >= gamePattern.length) {
                        clearInterval(intervalId);
                        isPlayingSequence = false; // Allow user to click again
                    }
                }, intervalSpeed);
            }, 500); // 500ms delay before starting sequence playback
        }

        function checkAnswer(currentLevel) {
            if (gamePattern[currentLevel] === userClickedPattern[currentLevel]) {
                if (userClickedPattern.length === gamePattern.length){
                    isPlayingSequence = true; // BUG FIX: Lock the board while waiting for next level!
                    setTimeout(nextSequence, 1000);
                }
            } else {
                playSound("wrong", 500);
                document.getElementById("level-title").innerText = "Game Over! Press Start to Restart";
                document.body.classList.add("game-over-effect");
                setTimeout(() => document.body.classList.remove("game-over-effect"), 500);
                document.getElementById("start-btn").style.display = "block";
                startOver();
            }
        }

        function startOver() {
            level = 0;
            gamePattern = [];
            started = false;
            isPlayingSequence = false;
        }

        // Handle user clicks
        document.querySelectorAll(".simon-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                if (!started || isPlayingSequence) return; // Prevent clicking before start or during playback
                
                const userChosenColor = this.id;
                userClickedPattern.push(userChosenColor);
                
                playSound(userChosenColor, 300);
                animatePress(userChosenColor, 300);
                
                checkAnswer(userClickedPattern.length - 1);
            });
        });

        // Start Game
        document.getElementById("start-btn").addEventListener("click", function() {
            if (!started) {
                this.style.display = "none";
                document.getElementById("level-title").innerText = "Level " + level;
                started = true;
                nextSequence();
            }
        });
    </script>
</body>
</html>
