<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Snap</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            corePlugins: { preflight: false },
            theme: { extend: { fontFamily: { arcade: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'] } } }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a1025 0%, #090910 80%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        .back-link {
            color: #e056fd;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid rgba(224, 86, 253, 0.4);
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(224, 86, 253, 0.1);
            transition: all 0.2s;
        }
        .back-link:hover {
            background: rgba(224, 86, 253, 0.2);
            box-shadow: 0 0 15px rgba(224, 86, 253, 0.4);
        }

        .hud {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 12px 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hud-label { font-size: 0.75rem; color: #bdc3c7; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 2px;}
        .hud-value { font-size: 1.7rem; font-weight: 900; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .time-val { color: #ff5a76; text-shadow: 0 0 10px rgba(255, 90, 118, 0.5); }
        .score-val { color: #2dfc8f; text-shadow: 0 0 10px rgba(45, 252, 143, 0.5); }

        .target-panel {
            background: rgba(11, 12, 16, 0.6);
            position: relative;
            z-index: 10;
            border: 2px solid rgba(224, 86, 253, 0.5);
            border-radius: 16px;
            padding: 15px 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6), inset 0 0 20px rgba(224, 86, 253, 0.15);
            backdrop-filter: blur(5px);
        }

        .target-title {
            margin: 0 0 10px;
            color: #e056fd;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(224, 86, 253, 0.5);
        }

        .target-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            position: relative;
            z-index: 10;
            gap: 14px;
            width: 100%;
            max-width: 500px;
            padding: 5px 15px;
            box-sizing: border-box;
            perspective: 1000px;
        }

        .snap-card {
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.4));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: transform 0.05s, box-shadow 0.05s, opacity 0.2s, background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .snap-card svg {
            width: 70%;
            height: 70%;
            pointer-events: none;
        }

        .snap-card:active {
            transform: translateY(4px) scale(0.95);
            box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(0,0,0,0.3));
        }

        .snap-card.found {
            animation: snapPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
        }

        @keyframes snapPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.2); opacity: 1; filter: brightness(1.5); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { transform: scale(0); opacity: 0; }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101;
            animation: explode 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.4), 0 2px 5px rgba(0,0,0,0.3);
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .floating-text {
            position: fixed;
            font-size: 1.8rem;
            font-weight: 900;
            z-index: 102;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            20% { transform: translate(-50%, -80%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(1); opacity: 0; }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(9, 9, 16, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .overlay h2 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0 0 10px;
            color: #e056fd;
            text-shadow: 0 0 20px rgba(224, 86, 253, 0.5);
            text-transform: uppercase;
            font-weight: 950;
        }

        .start-btn {
            background: linear-gradient(135deg, #e056fd, #4dabff);
            border: none;
            color: #000;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #7b1fa2, 0 15px 25px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-top: 20px;
        }
        .start-btn:hover {
            filter: brightness(1.15);
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7b1fa2, 0 5px 10px rgba(0,0,0,0.5);
        }

        .shake {
            animation: screenShake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-10px, 5px) rotate(-1deg); }
            40% { transform: translate(10px, -5px) rotate(1deg); }
            60% { transform: translate(-5px, -2px) rotate(-0.5deg); }
            80% { transform: translate(5px, 2px) rotate(0.5deg); }
        }
        
        .flash-red {
            animation: flashRedAnim 0.3s ease-out;
        }
        @keyframes flashRedAnim {
            0% { box-shadow: inset 0 0 100px rgba(255, 90, 118, 0.8); }
            100% { box-shadow: inset 0 0 0 transparent; }
        }
        
        @keyframes countdownAnim {
            0% { transform: scale(0.5); opacity: 0; }
            15% { transform: scale(1.2); opacity: 1; }
            85% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .bg-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            animation: bgFlashAnim 0.6s ease-out forwards;
        }
        @keyframes bgFlashAnim {
            0% { opacity: var(--max-opacity); box-shadow: inset 0 0 60px var(--flash-color); }
            100% { opacity: 0; box-shadow: inset 0 0 0px var(--flash-color); }
        }
    </style>
</head>
<body class="font-arcade">
    <div class="header">
        <a href="gamedashboard.html" class="back-link">&larr; Dashboard</a>
        <button class="back-link" onclick="togglePause()" style="cursor: pointer; font-family: inherit; border-color: #4dabff; color: #4dabff; background: rgba(77, 171, 255, 0.1);">PAUSE</button>
    </div>

    <div class="hud">
        <div class="hud-item">
            <span class="hud-label">TIME</span>
            <span class="hud-value time-val" id="time-display">60s</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-value score-val" id="score-display">0</span>
        </div>
    </div>

    <div class="target-panel">
        <h3 class="target-title">Snap All Matching</h3>
        <div class="target-icon" id="target-icon"></div>
    </div>

    <div class="grid-container" id="grid">
        <!-- Cards generated by JS -->
    </div>

    <!-- Modals -->
    <div class="overlay" id="start-overlay">
        <h2>Shape Snap</h2>
        <p style="color:#bdc3c7; max-width:300px; line-height:1.5; margin-top:0;">Rapid pattern recognition! Tap all shapes in the grid that match the target shape AND color. Mistakes cost time!</p>
        <button class="start-btn" onclick="startGame()">PLAY NOW</button>
    </div>

    <div class="overlay" id="pause-overlay" style="display:none;">
        <h2 style="color: #4dabff; text-shadow: 0 0 20px rgba(77, 171, 255, 0.5);">PAUSED</h2>
        <button class="start-btn" onclick="togglePause()">RESUME</button>
        <button class="start-btn" onclick="startGame()" style="margin-top: 15px; background: linear-gradient(135deg, #ffd166, #ff5a76); box-shadow: 0 6px 0 #a33b4e;">RESTART</button>
        <button class="start-btn" onclick="window.location.href='gamedashboard.html'" style="margin-top: 15px; background: transparent; color: #bdc3c7; box-shadow: none; border: 2px solid #bdc3c7;">MAIN MENU</button>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5); font-weight: bold; margin-top: 20px;">Press ESC or P to Resume</p>
    </div>

    <div class="overlay" id="end-overlay" style="display:none;">
        <h2 id="end-title">Time's Up!</h2>
        <p style="margin-bottom: 5px; font-size: 0.9rem; font-weight: bold;">FINAL SCORE</p>
        <p><span id="end-score" style="color: #2dfc8f; font-weight: 900; font-size: 2.5rem; text-shadow: 0 0 15px rgba(45, 252, 143, 0.5);">0</span></p>
        <div style="font-size:0.9rem; color:#ffd166; margin-bottom: 15px;">HIGH SCORE: <span id="high-score-display">0</span></div>
        <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
        <button class="start-btn" onclick="window.location.href='gamedashboard.html'" style="margin-top: 15px; background: transparent; color: #bdc3c7; box-shadow: none; border: 2px solid #bdc3c7;">MAIN MENU</button>
    </div>

    <div id="countdown-overlay" class="overlay" style="display: none; background: rgba(9, 9, 16, 0.8);">
        <div id="countdown-text" style="font-size: 8rem; font-weight: 950; color: #e056fd; text-shadow: 0 0 30px rgba(224, 86, 253, 0.8);">5</div>
    </div>

    <script>
        const SHAPES = ['circle', 'square', 'triangle', 'diamond', 'hexagon', 'star'];
        const COLORS = ['#ff5a76', '#4dabff', '#2dfc8f', '#ffd166', '#e056fd'];
        
        let state = 'start';
        let score = 0;
        let timeLeft = 60.0;
        let timerInterval;
        let currentTarget = null;
        let matchesNeeded = 0;
        let gridData = [];
        let countdownTimeout;
        let comboMultiplier = 0;
        let comboTimeout = null;
        
        const gridEl = document.getElementById('grid');
        const timeDisplay = document.getElementById('time-display');
        const scoreDisplay = document.getElementById('score-display');
        const targetIconEl = document.getElementById('target-icon');
        const bodyEl = document.body;

        // Audio setup
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function togglePause() {
            if (state === 'playing') {
                state = 'paused';
                document.getElementById('pause-overlay').style.display = 'flex';
            } else if (state === 'paused') {
                state = 'playing';
                document.getElementById('pause-overlay').style.display = 'none';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.key.toLowerCase() === 'p') {
                togglePause();
            }
        });

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'clear') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.05);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'tick') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'go') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        function getSvgPath(shape) {
            switch(shape) {
                case 'circle': return `<circle cx="50" cy="50" r="40" />`;
                case 'square': return `<rect x="15" y="15" width="70" height="70" rx="12" />`;
                case 'triangle': return `<path d="M50 15 L85 80 L15 80 Z" stroke-linejoin="round" />`;
                case 'diamond': return `<path d="M50 10 L85 50 L50 90 L15 50 Z" stroke-linejoin="round" />`;
                case 'hexagon': return `<path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" stroke-linejoin="round" />`;
                case 'star': return `<path d="M50 5 L62 35 L95 35 L68 55 L78 85 L50 65 L22 85 L32 55 L5 35 L38 35 Z" stroke-linejoin="round" />`;
            }
        }

        function buildSvg(shape, color) {
            return `<svg viewBox="0 0 100 100" fill="${color}" style="filter: drop-shadow(0 0 8px ${color});">${getSvgPath(shape)}</svg>`;
        }

        function generateRound() {
            currentTarget = {
                shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            };
            targetIconEl.innerHTML = buildSvg(currentTarget.shape, currentTarget.color);
            
            matchesNeeded = Math.floor(Math.random() * 3) + 2; // 2 to 4 matches
            gridData = [];
            
            for (let i = 0; i < 16; i++) {
                if (i < matchesNeeded) {
                    gridData.push({ ...currentTarget, isTarget: true, found: false });
                } else {
                    let randShape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                    let randColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                    // Ensure it is NOT a perfect match
                    while(randShape === currentTarget.shape && randColor === currentTarget.color) {
                        randShape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                        randColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                    }
                    gridData.push({ shape: randShape, color: randColor, isTarget: false, found: false });
                }
            }
            
            // Shuffle grid
            gridData.sort(() => Math.random() - 0.5);
            renderGrid();
        }

        function renderGrid() {
            gridEl.innerHTML = '';
            gridData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'snap-card';
                card.innerHTML = buildSvg(item.shape, item.color);
                card.onpointerdown = (e) => {
                    e.preventDefault();
                    handleTap(index, card);
                };
                gridEl.appendChild(card);
            });
        }

        function handleTap(index, cardEl) {
            if (state !== 'playing') return;
            initAudio();
            const item = gridData[index];
            if (item.found) return;

            if (item.isTarget) {
                item.found = true;
                cardEl.classList.add('found');
                matchesNeeded--;
                
                comboMultiplier++;
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => { comboMultiplier = 0; }, 3000);
                
                let pointsAdded = 10 * comboMultiplier;
                score += pointsAdded;
                scoreDisplay.innerText = score;
                playSound('pop');
                
                const rect = cardEl.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                spawnGoodEffect(centerX, centerY, item.color, pointsAdded, comboMultiplier);

                if (matchesNeeded <= 0) {
                    playSound('clear');
                    timeLeft += 1.5; // time bonus
                    generateRound();
                }
            } else {
                // Penalty
                comboMultiplier = 0;
                if (comboTimeout) clearTimeout(comboTimeout);
                
                playSound('error');
                timeLeft = Math.max(0, timeLeft - 2.0);
                timeDisplay.innerText = Math.ceil(timeLeft) + 's';
                
                bodyEl.classList.remove('flash-red');
                void bodyEl.offsetWidth; // trigger reflow
                bodyEl.classList.add('flash-red');
                
                gridEl.classList.remove('shake');
                void gridEl.offsetWidth;
                gridEl.classList.add('shake');
            }
        }

        function spawnGoodEffect(startX, startY, color, pointsAdded, currentCombo) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+' + pointsAdded;
            if (currentCombo > 1) {
                text.innerText += ` (x${currentCombo})`;
                text.style.fontSize = Math.min(1.8 + (currentCombo * 0.2), 3.5) + 'rem';
                text.style.color = '#ffd166';
            } else {
                text.style.color = color;
            }
            text.style.left = startX + 'px';
            text.style.top = startY + 'px';
            text.style.textShadow = `0 2px 5px rgba(0,0,0,0.8), 0 0 15px ${color}`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 800);

            let particleCount = Math.min(12 + (currentCombo * 4), 40);
            let explosionScale = Math.min(1 + (currentCombo * 0.15), 2.5);

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = color;
                
                const size = (Math.random() * 10 + 6) * explosionScale;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = (startX - size/2) + 'px';
                p.style.top = (startY - size/2) + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = (Math.random() * 80 + 30) * explosionScale;
                p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }

            if (currentCombo > 1) {
                const flash = document.createElement('div');
                flash.className = 'bg-flash';
                flash.style.setProperty('--flash-color', color);
                flash.style.setProperty('--max-opacity', Math.min(0.15 + (currentCombo * 0.05), 0.4));
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 600);
            }
        }

        function startGame() {
            initAudio();
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('end-overlay').style.display = 'none';
            document.getElementById('pause-overlay').style.display = 'none';
            
            if (countdownTimeout) clearTimeout(countdownTimeout);
            clearInterval(timerInterval);

            state = 'countdown';
            let count = 5;
            const cdOverlay = document.getElementById('countdown-overlay');
            const cdText = document.getElementById('countdown-text');
            cdOverlay.style.display = 'flex';

            gridEl.innerHTML = '';
            targetIconEl.innerHTML = '';
            scoreDisplay.innerText = '0';
            timeDisplay.innerText = '60s';
            timeDisplay.style.color = '#fff';

            function tick() {
                if (state !== 'countdown') return;
                
                if (count > 0) {
                    cdText.innerText = count;
                    cdText.style.color = '#ffd166';
                    cdText.style.textShadow = '0 0 30px rgba(255, 209, 102, 0.8)';
                    cdText.style.animation = 'none';
                    void cdText.offsetWidth; // trigger reflow
                    cdText.style.animation = 'countdownAnim 1s ease-in-out';
                    playSound('tick');
                    count--;
                    countdownTimeout = setTimeout(tick, 1000);
                } else if (count === 0) {
                    cdText.innerText = 'GO!';
                    cdText.style.color = '#2dfc8f';
                    cdText.style.textShadow = '0 0 30px rgba(45, 252, 143, 0.8)';
                    cdText.style.animation = 'none';
                    void cdText.offsetWidth;
                    cdText.style.animation = 'countdownAnim 1s ease-in-out';
                    playSound('go');
                    count--;
                    countdownTimeout = setTimeout(tick, 1000);
                } else {
                    cdOverlay.style.display = 'none';
                    startActualGame();
                }
            }
            tick();
        }

        function startActualGame() {
            state = 'playing';
            score = 0;
            comboMultiplier = 0;
            if (comboTimeout) clearTimeout(comboTimeout);
            timeLeft = 60.0;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = Math.ceil(timeLeft) + 's';
            
            generateRound();
            
            timerInterval = setInterval(() => {
                if (state !== 'playing') return;
                timeLeft -= 0.1;
                timeDisplay.innerText = Math.ceil(timeLeft) + 's';
                
                if (timeLeft <= 5) timeDisplay.style.color = '#ff5a76';
                else timeDisplay.style.color = '#fff';

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    timeDisplay.innerText = '0s';
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            state = 'end';
            clearInterval(timerInterval);
            
            let highscore = parseInt(localStorage.getItem('shapeSnapHighScore')) || 0;
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('shapeSnapHighScore', highscore);
            }
            
            document.getElementById('end-score').innerText = score;
            document.getElementById('high-score-display').innerText = highscore;
            document.getElementById('end-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
