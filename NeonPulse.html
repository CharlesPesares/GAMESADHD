<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pulse</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            corePlugins: { preflight: false },
            theme: { extend: { fontFamily: { arcade: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'] } } }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #090910 80%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            text-transform: uppercase;
            touch-action: none; /* Prevent double-tap zoom on mobile */
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        .header {
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
            z-index: 10;
        }

        .back-link {
            color: #e056fd;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            transition: color 0.3s;
            margin-bottom: 10px;
            font-weight: bold;
            border: 1px solid rgba(224, 86, 253, 0.4);
            padding: 6px 16px;
            border-radius: 999px;
            background: rgba(224, 86, 253, 0.1);
        }

        .back-link:hover {
            color: #fff;
            background: rgba(224, 86, 253, 0.2);
            box-shadow: 0 0 15px rgba(224, 86, 253, 0.4);
        }

        h1 {
            margin: 0;
            color: #2dfc8f;
            text-shadow: 0 0 15px rgba(45, 252, 143, 0.5), 0 0 30px rgba(45, 252, 143, 0.3);
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 4px;
            font-weight: 900;
        }

        .hud-bar {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 40;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .hud-item { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .hud-label { font-size: 0.65rem; color: #bdc3c7; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px; }
        .hud-value { font-size: 1.25rem; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .game-container {
            position: relative;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(45, 252, 143, 0.1);
            background: #0b0c10;
            overflow: hidden;
            margin-top: 10px;
            width: min(400px, 95vw);
        }

        .game-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }

        canvas {
            display: block;
            background: #050508;
            width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(9, 9, 16, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .overlay h2 {
            font-size: 3.5rem;
            margin: 0 0 10px;
            color: #2dfc8f;
            text-shadow: 0 0 15px #2dfc8f;
            line-height: 1;
        }

        .overlay p {
            font-size: 1.1rem;
            color: #bdc3c7;
            margin-bottom: 20px;
        }

        .start-btn {
            background: linear-gradient(135deg, #2dfc8f, #4dabff);
            border: none;
            color: #000;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #1b9b5a, 0 15px 25px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-top: 20px;
        }

        .start-btn:hover {
            filter: brightness(1.15);
        }
        
        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1b9b5a, 0 5px 10px rgba(0,0,0,0.5);
        }
        
        .level-select {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(77, 171, 255, 0.5);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            margin: 10px 0 20px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .level-select option {
            background: #0b0c10;
            color: #fff;
        }

        .mobile-controls {
            display: flex;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            margin-top: 20px;
            margin-bottom: 20px;
            gap: 12px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .lane-btn {
            flex: 1;
            height: 75px;
            border-radius: 12px;
            border: 2px solid;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.4));
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.05s, background 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
        }
        
        .lane-btn.l0 { border-color: #ff5a76; color: #ff5a76; }
        .lane-btn.l1 { border-color: #4dabff; color: #4dabff; }
        .lane-btn.l2 { border-color: #2dfc8f; color: #2dfc8f; }
        .lane-btn.l3 { border-color: #ffd166; color: #ffd166; }

        .lane-btn:active, .lane-btn.active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            color: #000;
        }
        
        .lane-btn.l0:active, .lane-btn.l0.active { background: #ff5a76; box-shadow: 0 0 20px #ff5a76; }
        .lane-btn.l1:active, .lane-btn.l1.active { background: #4dabff; box-shadow: 0 0 20px #4dabff; }
        .lane-btn.l2:active, .lane-btn.l2.active { background: #2dfc8f; box-shadow: 0 0 20px #2dfc8f; }
        .lane-btn.l3:active, .lane-btn.l3.active { background: #ffd166; box-shadow: 0 0 20px #ffd166; }

        #countdown-overlay {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 60;
            pointer-events: none;
        }
        .countdown-text {
            font-size: 6rem;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
        }
        @keyframes countdownAnim {
            0% { transform: scale(0.5); opacity: 0; }
            15% { transform: scale(1.2); opacity: 1; }
            85% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        @keyframes perfectPulse {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.08); filter: brightness(1.3); }
        }
    </style>
</head>
<body class="font-arcade">
    <div class="header">
        <a href="gamedashboard.html" class="back-link">&larr; Dashboard</a>
        <h1>Neon Pulse</h1>
    </div>

    <div class="game-container">
        <div class="hud-bar">
            <div class="hud-item">
                <span class="hud-label">LEVEL</span>
                <span class="hud-value" style="color: #2dfc8f;" id="hud-level">1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">SCORE</span>
                <span class="hud-value" style="color: #4dabff;" id="hud-score">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">LIVES</span>
                <span class="hud-value" style="color: #ff5a76;" id="hud-lives">10</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="overlay" id="start-overlay">
            <h2>Rhythm Ready?</h2>
            <p>Tap or hold exactly as the notes hit the line.</p>
            <select id="level-selector" class="level-select" aria-label="Select Level" onchange="jumpToLevel(this.value)"></select>
            
            <div id="level-record-ui" style="display: flex; gap: 20px; background: rgba(0,0,0,0.6); padding: 12px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); min-width: 250px; justify-content: center;">
                <div style="text-align: center; flex: 1;">
                    <div style="font-size: 0.7rem; color: #bdc3c7; font-weight: 900; letter-spacing: 1px;">BEST SCORE</div>
                    <div id="record-score" style="font-size: 1.6rem; font-weight: 900; color: #4dabff; text-shadow: 0 0 10px rgba(77,171,255,0.5);">---</div>
                </div>
                <div style="width: 2px; background: rgba(255,255,255,0.1); border-radius: 2px;"></div>
                <div style="text-align: center; flex: 1;">
                    <div style="font-size: 0.7rem; color: #bdc3c7; font-weight: 900; letter-spacing: 1px;">RANK</div>
                    <div id="record-rank" style="font-size: 1.6rem; font-weight: 900; color: #bdc3c7;">-</div>
                </div>
            </div>

            <button class="start-btn" onclick="startGame()" style="margin-top: 5px;">START TRACK</button>
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5); font-weight: bold; margin-top: 15px;">Keys: D, F, J, K or Touch</p>
        </div>

        <div class="overlay" id="end-overlay" style="display: none;">
            <h2 id="end-title" style="color: #ff5a76; text-shadow: 0 0 15px rgba(255, 90, 118, 0.5); font-size: clamp(2rem, 8vw, 3.5rem);">Track Ended</h2>
            <p style="margin: 0 0 5px; font-size: 0.9rem; font-weight: bold;">FINAL SCORE</p>
            <p style="margin: 0 0 10px;"><span id="end-score" style="color: #4dabff; font-weight: 900; font-size: 2.5rem; text-shadow: 0 0 15px rgba(77,171,255,0.5);">0</span></p>
            <div id="end-grade" style="font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px; text-shadow: 0 0 20px currentColor; display: none;">S</div>
            <div id="perfect-label" style="display: none; color: #ffd166; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,209,102,0.8); margin-bottom: 15px; animation: perfectPulse 0.5s ease-in-out infinite alternate;">PERFECT TRACK!</div>
            <div style="display: flex; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                <div style="color: #2dfc8f; text-align: center;">
                    <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1px;">PERFECT</div>
                    <div id="end-perfect" style="font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 10px rgba(45,252,143,0.5);">0</div>
                </div>
                <div style="color: #ffdf3f; text-align: center;">
                    <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1px;">GOOD</div>
                    <div id="end-good" style="font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 10px rgba(255,223,63,0.5);">0</div>
                </div>
                <div style="color: #ff5a76; text-align: center;">
                    <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1px;">MISS</div>
                    <div id="end-miss" style="font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 10px rgba(255,90,118,0.5);">0</div>
                </div>
            </div>
            <button id="end-btn" class="start-btn" onclick="startGame()" style="margin-top: 0; padding: 12px 30px; font-size: 1.1rem;">PLAY AGAIN</button>
            <button class="start-btn" onclick="showStartScreen()" style="margin-top: 10px; padding: 12px 30px; font-size: 1.1rem; background: transparent; color: #bdc3c7; box-shadow: none; border: 2px solid #bdc3c7;">MAIN MENU</button>
        </div>

        <div id="countdown-overlay">
            <div id="countdown-text" class="countdown-text">3</div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="lane-btn l0" id="btn-0" data-lane="0">D</div>
        <div class="lane-btn l1" id="btn-1" data-lane="1">F</div>
        <div class="lane-btn l2" id="btn-2" data-lane="2">J</div>
        <div class="lane-btn l3" id="btn-3" data-lane="3">K</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const colors = ['#ff5a76', '#4dabff', '#2dfc8f', '#ffd166'];
        const laneWidth = canvas.width / 4;
        const hitZoneY = 500;
        
        let state = 'start';
        let score = 0;
        let combo = 0;
        let multiplier = 1;
        let lives = 10;
        let notes = [];
        let particles = [];
        let shockwaves = [];
        let feedbacks = [];
        let laneGlows = [0, 0, 0, 0];
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 600; // ms
        let speed = 6; // px per frame
        let flashRed = 0;
        let laneHeld = [false, false, false, false];
        let comboScale = 1.0;
        let statsPerfect = 0;
        let statsGood = 0;
        let statsMiss = 0;
        let comboShake = 0;
        let lastBrokenCombo = 0;
        let sparks = [];
        const sparkColors = ['#ff5a76', '#4dabff', '#2dfc8f', '#ffd166', '#ffffff'];
        
        let currentLevel = parseInt(localStorage.getItem('neonPulseLevel')) || 1;
        let maxLevel = parseInt(localStorage.getItem('neonPulseMaxLevel')) || currentLevel;
        let notesLeftToSpawn = 0;
        let levelComplete = false;
        let countdownTimeout = null;
        
        // Audio Context
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'perfect') {
                // Luscious glassy hit with a sharp transient
                const freqs = [523.25, 783.99, 1046.50, 1567.98]; // C5, G5, C6, G6
                freqs.forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = i === 0 ? 'triangle' : 'sine'; // Base has slight body
                    osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(i === 0 ? 0.4 : 0.2, now + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.4);
                });

                // Crisp timing click (transient)
                const clickOsc = audioCtx.createOscillator();
                const clickGain = audioCtx.createGain();
                clickOsc.type = 'sine';
                clickOsc.frequency.setValueAtTime(4000, now);
                clickOsc.frequency.exponentialRampToValueAtTime(100, now + 0.04);
                clickGain.gain.setValueAtTime(0, now);
                clickGain.gain.linearRampToValueAtTime(0.3, now + 0.002);
                clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                clickOsc.connect(clickGain); clickGain.connect(audioCtx.destination);
                clickOsc.start(now); clickOsc.stop(now + 0.04);
            } else if (type === 'good') {
                // Warmer, muted hit for 'good'
                const freqs = [523.25, 783.99]; 
                freqs.forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.2, now + 0.02); // Slower attack
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                });
            } else if (type === 'miss') {
                // Record scratch / deep thud error
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);

                const buzz = audioCtx.createOscillator();
                const buzzGain = audioCtx.createGain();
                buzz.type = 'sawtooth';
                buzz.frequency.setValueAtTime(100, now);
                buzz.frequency.exponentialRampToValueAtTime(10, now + 0.15);
                buzzGain.gain.setValueAtTime(0, now);
                buzzGain.gain.linearRampToValueAtTime(0.15, now + 0.01);
                buzzGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                buzz.connect(buzzGain); buzzGain.connect(audioCtx.destination);
                buzz.start(now); buzz.stop(now + 0.15);
            } else if (type === 'tick') {
                // Sharp high hat tick
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(3000, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'go') {
                // Glorious power-up chord burst
                const freqs = [523.25, 659.25, 783.99, 1046.50, 1567.98];
                freqs.forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = i === 0 ? 'triangle' : 'sine';
                    const startTime = now + (i * 0.03); // Fast arpeggio
                    osc.frequency.setValueAtTime(f, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.8);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(startTime); osc.stop(startTime + 0.8);
                });
            } else if (type === 'click') {
                // Clean UI snap
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.04);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.25, now + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.04);
            }
        }

        function unlockAchievement(id, icon, title) {
            let achievements = JSON.parse(localStorage.getItem('arcade_achievements')) || {};
            if (!achievements[id]) {
                achievements[id] = true;
                localStorage.setItem('arcade_achievements', JSON.stringify(achievements));
                
                const toast = document.getElementById('achievement-toast');
                document.getElementById('toast-icon').innerText = icon;
                document.getElementById('toast-title').innerText = title;
                toast.classList.add('show');
                
                playSound('go');
                
                setTimeout(() => toast.classList.remove('show'), 4000);
            }
        }

        function incrementLocalCounter(key, val) {
            try {
                const current = parseInt(localStorage.getItem(key)) || 0;
                if (val > current) localStorage.setItem(key, val);
            } catch(e) {}
        }

        function updateLevelSelector() {
            const selector = document.getElementById('level-selector');
            if (!selector) return;
            selector.innerHTML = '';
            for (let i = 1; i <= Math.min(50, maxLevel); i++) {
                const opt = document.createElement('option');
                opt.value = i;
                
                opt.text = 'Level ' + i;
                if (i === currentLevel) opt.selected = true;
                selector.appendChild(opt);
            }
            updateRecordUI();
        }

        function jumpToLevel(lvl) {
            currentLevel = parseInt(lvl);
            localStorage.setItem('neonPulseLevel', currentLevel);
            updateRecordUI();
        }

        function updateRecordUI() {
            const scoreEl = document.getElementById('record-score');
            const rankEl = document.getElementById('record-rank');
            if (!scoreEl || !rankEl) return;

            try {
                const savedDataStr = localStorage.getItem(`neonPulse_lvl_${currentLevel}`);
                if (savedDataStr) {
                    const savedData = JSON.parse(savedDataStr);
                    scoreEl.innerText = savedData.score;
                    rankEl.innerText = savedData.grade;
                    
                    let color = '#fff';
                    if(savedData.grade === 'SS') color = '#00ffff';
                    if(savedData.grade === 'S') color = '#ffd166';
                    if(savedData.grade === 'A') color = '#2dfc8f';
                    if(savedData.grade === 'B') color = '#4dabff';
                    if(savedData.grade === 'C') color = '#e056fd';
                    if(savedData.grade === 'D') color = '#bdc3c7';
                    if(savedData.grade === 'F') color = '#ff5a76';
                    
                    rankEl.style.color = color;
                    rankEl.style.textShadow = `0 0 10px ${color}`;
                } else {
                    scoreEl.innerText = '---';
                    if (currentLevel < maxLevel) {
                        rankEl.innerText = 'CLEAR';
                        rankEl.style.color = '#2dfc8f';
                        rankEl.style.textShadow = '0 0 10px rgba(45,252,143,0.5)';
                    } else {
                        rankEl.innerText = 'UNPLAYED';
                        rankEl.style.color = '#bdc3c7';
                        rankEl.style.textShadow = 'none';
                    }
                }
            } catch(e) {
                scoreEl.innerText = '---';
                rankEl.innerText = '-';
            }
        }

        function showStartScreen() {
            state = 'start';
            if (countdownTimeout) clearTimeout(countdownTimeout);
            document.getElementById('countdown-overlay').style.display = 'none';
            document.getElementById('end-overlay').style.display = 'none';
            document.getElementById('start-overlay').style.display = 'flex';
            updateLevelSelector();
            drawEmptyBoard();
        }

        function startGame() {
            initAudio();
            if (countdownTimeout) clearTimeout(countdownTimeout);
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('end-overlay').style.display = 'none';
            
            score = 0;
            combo = 0;
            multiplier = 1;
            comboScale = 1.0;
            lives = 10;
            statsPerfect = 0;
            statsGood = 0;
            statsMiss = 0;
            comboShake = 0;
            lastBrokenCombo = 0;
            document.getElementById('hud-level').innerText = currentLevel;
            document.getElementById('hud-score').innerText = score;
            document.getElementById('hud-lives').innerText = lives;
            
            drawEmptyBoard();

            state = 'countdown';
            let count = 3;
            const cdOverlay = document.getElementById('countdown-overlay');
            const cdText = document.getElementById('countdown-text');
            cdOverlay.style.display = 'flex';

            function tick() {
                if (state !== 'countdown') return;
                
                if (count > 0) {
                    cdText.innerText = count;
                    cdText.style.color = '#ffd166';
                    cdText.style.textShadow = '0 0 30px rgba(255, 209, 102, 0.8)';
                    cdText.style.animation = 'none';
                    void cdText.offsetWidth; // trigger reflow
                    cdText.style.animation = 'countdownAnim 1s ease-in-out';
                    playSound('tick');
                    count--;
                    countdownTimeout = setTimeout(tick, 1000);
                } else if (count === 0) {
                    cdText.innerText = 'GO!';
                    cdText.style.color = '#2dfc8f';
                    cdText.style.textShadow = '0 0 30px rgba(45, 252, 143, 0.8)';
                    cdText.style.animation = 'none';
                    void cdText.offsetWidth;
                    cdText.style.animation = 'countdownAnim 1s ease-in-out';
                    playSound('go');
                    count--;
                    countdownTimeout = setTimeout(tick, 1000);
                } else {
                    cdOverlay.style.display = 'none';
                    startTrack();
                }
            }
            tick();
        }

        function startTrack() {
            state = 'playing';
            notes = [];
            particles = [];
            shockwaves = [];
            feedbacks = [];
            flashRed = 0;
            laneHeld = [false, false, false, false];
            levelComplete = false;
            comboShake = 0;
            lastBrokenCombo = 0;
            spawnTimer = 0;
            
            sparks = [];
            for (let i = 0; i < 40; i++) {
                sparks.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 4 + 1,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.1,
                    color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
                });
            }
            
            // Progressive level scaling
            notesLeftToSpawn = 20 + (currentLevel * 5); 
            speed = 4.0 + (currentLevel * 0.15); 
            spawnInterval = Math.max(250, 800 - (currentLevel * 10));
            
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function spawnNote() {
            let validLanes = [0, 1, 2, 3];
            for (let i = 0; i < notes.length; i++) {
                let note = notes[i];
                if (note.active) {
                    let tailY = note.type === 'hold' ? note.y - note.length : note.y;
                    if (tailY < 80) {
                        validLanes = validLanes.filter(l => l !== note.lane);
                    }
                }
            }
            
            if (validLanes.length === 0) return false;

            const lane = validLanes[Math.floor(Math.random() * validLanes.length)];
            const isHold = Math.random() > 0.85; // 15% chance for a hold note
            const length = isHold ? (Math.random() * 200 + 100) : 0;
            notes.push({ lane, y: -30, active: true, type: isHold ? 'hold' : 'tap', length: length, holding: false });
            
            // Occasionally spawn a double note
            if (Math.random() > 0.8 && !isHold && validLanes.length > 1) {
                let secondValidLanes = validLanes.filter(l => l !== lane);
                let secondLane = secondValidLanes[Math.floor(Math.random() * secondValidLanes.length)];
                notes.push({ lane: secondLane, y: -30, active: true, type: 'tap', length: 0, holding: false });
            }
            return true;
        }

        function createParticles(lane, y, color) {
            const centerX = lane * laneWidth + laneWidth / 2;
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: centerX,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function createExplosion(lane, y, color) {
            const centerX = lane * laneWidth + laneWidth / 2;
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 15 + 5;
                particles.push({
                    x: centerX,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.5,
                    color: Math.random() > 0.5 ? color : '#ffffff' // Mix in white hot core particles
                });
            }
            createShockwave(lane, y, color);
            // Add a delayed, inner white shockwave
            shockwaves.push({ x: centerX, y: y, radius: 0, alpha: 1.0, color: '#ffffff' });
        }

        function createShockwave(lane, y, color) {
            shockwaves.push({
                x: lane * laneWidth + laneWidth / 2,
                y: y,
                radius: 10,
                alpha: 1.0,
                color: color
            });
        }

        function spawnFeedback(lane, text, color) {
            feedbacks.push({
                x: lane * laneWidth + laneWidth / 2,
                y: hitZoneY - 40,
                text: text,
                color: color,
                life: 1.0,
                vy: -1
            });
        }

        function updateMultiplier() {
            let newMult = Math.min(4, 1 + Math.floor(combo / 10));
            if (newMult > multiplier) {
                multiplier = newMult;
                feedbacks.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 - 50,
                    text: `x${multiplier} MULTIPLIER!`,
                    color: '#ffd166',
                    life: 2.0,
                    vy: -1,
                    scale: 1.5
                });
            }
            multiplier = newMult;
        }

        function triggerMiss(lane) {
            if (combo > 0) {
                lastBrokenCombo = combo;
                comboShake = 1.0;
                comboScale = 1.5; // Emphasize the shatter
            }
            combo = 0;
            multiplier = 1;
            lives--;
            statsMiss++;
            playSound('miss');
            spawnFeedback(lane, 'MISS', '#ff5a76');
            document.getElementById('hud-lives').innerText = lives;
            flashRed = 1.0;
        }

        function hitLane(lane) {
            if (state !== 'playing') return;
            initAudio();
            laneGlows[lane] = 1.0;
            
            let hit = false;
            for (let i = 0; i < notes.length; i++) {
                let note = notes[i];
                if (note.active && note.lane === lane && !note.holding) {
                    let dist = Math.abs(note.y - hitZoneY);
                    if (dist < 60) {
                        hit = true;
                        if (dist < 20) {
                            spawnFeedback(lane, 'PERFECT', '#2dfc8f');
                            statsPerfect++;
                            playSound('perfect');
                            createParticles(lane, hitZoneY, colors[lane]);
                            createShockwave(lane, hitZoneY, colors[lane]);
                            if (note.type === 'tap') {
                                note.active = false;
                                combo++;
                                comboScale = 1.3;
                                updateMultiplier();
                                score += 100 * multiplier;
                            } else {
                                note.holding = true;
                            }
                        } else {
                            spawnFeedback(lane, 'GOOD', '#ffdf3f');
                            statsGood++;
                            playSound('good');
                            createParticles(lane, hitZoneY, colors[lane]);
                            if (note.type === 'tap') {
                                note.active = false;
                                combo++;
                                comboScale = 1.3;
                                updateMultiplier();
                                score += 50 * multiplier;
                            } else {
                                note.holding = true;
                            }
                        }
                        break; 
                    }
                }
            }
            
            if (!hit) {
                combo = 0;
                multiplier = 1;
                playSound('click');
            } else {
                document.getElementById('hud-score').innerText = score;
            }
        }

        function calculateGrade() {
            let total = statsPerfect + statsGood + statsMiss;
            if (total === 0) return { grade: 'F', color: '#ff5a76' };
            
            let accuracy = ((statsPerfect + statsGood * 0.5) / total) * 100;
            
            if (lives <= 0) return { grade: 'F', color: '#ff5a76' }; // Failed
            if (statsPerfect === total && total > 0) return { grade: 'SS', color: '#00ffff' }; // Diamond SS
            if (accuracy >= 95 && statsMiss === 0) return { grade: 'S', color: '#ffd166' }; // Gold S
            if (accuracy >= 90) return { grade: 'A', color: '#2dfc8f' }; // Green A
            if (accuracy >= 80) return { grade: 'B', color: '#4dabff' }; // Blue B
            if (accuracy >= 70) return { grade: 'C', color: '#e056fd' }; // Purple C
            if (accuracy >= 60) return { grade: 'D', color: '#bdc3c7' }; // Grey D
            return { grade: 'F', color: '#ff5a76' }; // Red F
        }

        function winLevel() {
            state = 'end';
            incrementLocalCounter('neonPulseHighscore', score);
            
            let gradeInfo = calculateGrade();
            if (gradeInfo.grade === 'SS') {
                unlockAchievement('neon_ss', '💎', 'Flawless Rhythm');
            }

            let gradeEl = document.getElementById('end-grade');
            gradeEl.innerText = gradeInfo.grade;
            gradeEl.style.color = gradeInfo.color;
            gradeEl.style.display = 'block';
            
            let perfectLabel = document.getElementById('perfect-label');
            if (statsMiss === 0) {
                perfectLabel.style.display = 'block';
            } else {
                perfectLabel.style.display = 'none';
            }

            try {
                const levelKey = `neonPulse_lvl_${currentLevel}`;
                const savedDataStr = localStorage.getItem(levelKey);
                let savedData = { score: -1 };
                if (savedDataStr) savedData = JSON.parse(savedDataStr);
                if (score > savedData.score) {
                    localStorage.setItem(levelKey, JSON.stringify({ score: score, grade: gradeInfo.grade }));
                }
            } catch(e) {}
            
            document.getElementById('end-perfect').innerText = statsPerfect;
            document.getElementById('end-good').innerText = statsGood;
            document.getElementById('end-miss').innerText = statsMiss;
            if (currentLevel < 50) {
                if (currentLevel === maxLevel) {
                    maxLevel++;
                    localStorage.setItem('neonPulseMaxLevel', maxLevel);
                }
                currentLevel++;
                localStorage.setItem('neonPulseLevel', currentLevel);
                updateLevelSelector();
                
                document.getElementById('end-title').innerText = "LEVEL CLEARED!";
                document.getElementById('end-title').style.color = "#2dfc8f";
                document.getElementById('end-title').style.textShadow = "0 0 15px rgba(45, 252, 143, 0.5)";
                document.getElementById('end-btn').innerText = "NEXT LEVEL";
            } else {
                updateLevelSelector();
                document.getElementById('end-title').innerText = "TRACK COMPLETE!";
                document.getElementById('end-title').style.color = "#ffd166";
                document.getElementById('end-title').style.textShadow = "0 0 15px rgba(255, 209, 102, 0.5)";
                document.getElementById('end-btn').innerText = "PLAY AGAIN";
            }
            document.getElementById('end-score').innerText = score;
            document.getElementById('end-overlay').style.display = 'flex';
        }

        function gameOver() {
            state = 'end';
            incrementLocalCounter('neonPulseHighscore', score);
            
            let gradeInfo = calculateGrade();
            let gradeEl = document.getElementById('end-grade');
            gradeEl.innerText = gradeInfo.grade;
            gradeEl.style.color = gradeInfo.color;
            gradeEl.style.display = 'block';
            
            document.getElementById('perfect-label').style.display = 'none';
            
            document.getElementById('end-title').innerText = "TRACK FAILED";
            document.getElementById('end-title').style.color = "#ff5a76";
            document.getElementById('end-title').style.textShadow = "0 0 15px rgba(255, 90, 118, 0.5)";
            document.getElementById('end-btn').innerText = "TRY AGAIN";
            document.getElementById('end-score').innerText = score;
            document.getElementById('end-perfect').innerText = statsPerfect;
            document.getElementById('end-good').innerText = statsGood;
            document.getElementById('end-miss').innerText = statsMiss;
            document.getElementById('end-overlay').style.display = 'flex';
        }

        function drawRoundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawTapNote(ctx, x, y, w, color) {
            let h = 30;
            let r = 10;
            let topY = y - h / 2;

            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            let grad = ctx.createLinearGradient(x, topY, x, topY + h);
            grad.addColorStop(0, '#ffffff'); 
            grad.addColorStop(0.2, color);
            grad.addColorStop(1, '#000000'); 

            ctx.fillStyle = grad;
            drawRoundedRect(ctx, x, topY, w, h, r);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            drawRoundedRect(ctx, x + w * 0.2, y - 4, w * 0.6, 8, 4);
            ctx.fill();

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            drawRoundedRect(ctx, x, topY, w, h, r);
            ctx.stroke();
        }

        function drawHoldRibbon(ctx, x, y, w, h, color, isHolding, time) {
            ctx.shadowBlur = isHolding ? 20 : 10;
            ctx.shadowColor = color;

            let ribbonGrad = ctx.createLinearGradient(x, 0, x + w, 0);
            ribbonGrad.addColorStop(0, 'rgba(0,0,0,0)');
            ribbonGrad.addColorStop(0.2, color);
            ribbonGrad.addColorStop(0.5, '#ffffff');
            ribbonGrad.addColorStop(0.8, color);
            ribbonGrad.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillStyle = ribbonGrad;
            ctx.globalAlpha = isHolding ? 0.9 : 0.5;
            ctx.fillRect(x + 5, y, w - 10, h);

            let pulse = (Math.sin(time / 100) + 1) / 2;
            ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + 0.6 * pulse})`;
            ctx.fillRect(x + w / 2 - 4, y, 8, h);

            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }

        function drawHoldRing(ctx, x, y, w, color) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            drawRoundedRect(ctx, x, y - 15, w, 30, 10);
            ctx.stroke();

            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            drawRoundedRect(ctx, x - 2, y - 17, w + 4, 34, 12);
            ctx.stroke();
        }

        function drawHoldTail(ctx, x, y, w, color) {
            let h = 20;
            let r = 8;
            let topY = y - h / 2;

            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            ctx.fillStyle = color;
            drawRoundedRect(ctx, x + 5, topY, w - 10, h, r);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            drawRoundedRect(ctx, x + w * 0.2, y - 2, w * 0.6, 4, 2);
            ctx.fill();

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            drawRoundedRect(ctx, x + 5, topY, w - 10, h, r);
            ctx.stroke();

            ctx.shadowBlur = 0;
        }
        
        function drawEmptyBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                let x = i * laneWidth;
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                ctx.stroke();
                ctx.strokeStyle = colors[i];
                ctx.lineWidth = 4;
                drawRoundedRect(ctx, x + 10, hitZoneY - 15, laneWidth - 20, 30, 10);
                ctx.stroke();
            }
        }

        function loop(time) {
            if (state !== 'playing') return;
            
            let dt = time - lastTime;
            lastTime = time;
            if (dt > 100) dt = 16;
            
            spawnTimer += dt;
            if (spawnTimer >= spawnInterval && notesLeftToSpawn > 0) {
                spawnTimer -= spawnInterval;
                if (spawnNote() !== false) {
                    notesLeftToSpawn--;
                }
            }

            if (notesLeftToSpawn <= 0 && notes.length === 0 && !levelComplete && state === 'playing') {
                levelComplete = true;
                winLevel();
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let isMaxCombo = multiplier >= 4;
            let bgPulse = isMaxCombo ? (Math.sin(time / 100) + 1) / 2 : 0;
            
            if (isMaxCombo) {
                ctx.fillStyle = `rgba(255, 209, 102, ${bgPulse * 0.08})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.y -= s.speed * (dt / 16);
                if (s.y < -10) {
                    s.y = canvas.height + 10;
                    s.x = Math.random() * canvas.width;
                }
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = s.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            for (let i = 0; i < 4; i++) {
                let x = i * laneWidth;
                
                if (isMaxCombo) {
                    ctx.strokeStyle = `rgba(255, 209, 102, ${0.1 + bgPulse * 0.3})`;
                    ctx.lineWidth = 2 + bgPulse * 2;
                    ctx.shadowBlur = 15 * bgPulse;
                    ctx.shadowColor = '#ffd166';
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.lineWidth = 2;
                }
                
                ctx.beginPath();
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.strokeStyle = colors[i];
                ctx.lineWidth = 4;
                drawRoundedRect(ctx, x + 10, hitZoneY - 15, laneWidth - 20, 30, 10);
                ctx.stroke();
                
                if (laneGlows[i] > 0) {
                    let glowGrad = ctx.createLinearGradient(x, hitZoneY - 300, x, hitZoneY + 100);
                    glowGrad.addColorStop(0, 'rgba(0,0,0,0)');
                    glowGrad.addColorStop(0.7, colors[i]);
                    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');

                    ctx.fillStyle = glowGrad;
                    ctx.globalAlpha = Math.min(1.0, laneGlows[i] * 0.5);
                    ctx.fillRect(x, hitZoneY - 300, laneWidth, 400);

                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = Math.min(1.0, laneGlows[i] * 0.9);
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = colors[i];
                    ctx.fillRect(x + laneWidth * 0.1, hitZoneY - 3, laneWidth * 0.8, 6);

                    ctx.globalAlpha = 1.0;
                    ctx.shadowBlur = 0;
                    laneGlows[i] -= 0.05;
                }
            }

            // --- DRAW CENTER COMBO COUNTER ---
            if (combo > 0 || comboShake > 0) {
                if (comboScale > 1.0) comboScale -= 0.05;
                
                let shakeX = 0;
                let shakeY = 0;
                if (comboShake > 0) {
                    shakeX = (Math.random() - 0.5) * 30 * comboShake;
                    shakeY = (Math.random() - 0.5) * 30 * comboShake;
                    comboShake -= 0.03;
                }

                ctx.save();
                ctx.translate(canvas.width / 2 + shakeX, canvas.height / 2 - 50 + shakeY);
                ctx.scale(comboScale, comboScale);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let displayCombo = combo > 0 ? combo : lastBrokenCombo;
                let isBroken = combo === 0 && comboShake > 0;
                
                let mainColor = isBroken ? `rgba(255, 90, 118, ${comboShake})` : 'rgba(255, 223, 63, 0.25)';
                let glowColor = isBroken ? `rgba(255, 90, 118, ${comboShake * 0.8})` : 'rgba(255, 223, 63, 0.4)';
                
                ctx.font = 'bold 120px "Segoe UI", sans-serif';
                ctx.fillStyle = mainColor;
                ctx.shadowBlur = 20;
                ctx.shadowColor = glowColor;
                ctx.fillText(displayCombo, 0, -20);
                
                ctx.font = '900 24px "Segoe UI", sans-serif';
                ctx.fillStyle = isBroken ? `rgba(255, 90, 118, ${comboShake})` : 'rgba(255, 255, 255, 0.25)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = isBroken ? `rgba(255, 90, 118, ${comboShake * 0.8})` : 'rgba(255, 255, 255, 0.3)';
                ctx.fillText(isBroken ? "BROKEN" : "COMBO", 0, 50);

                if (multiplier > 1 && !isBroken) {
                    ctx.font = '900 36px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(77, 171, 255, 0.3)';
                    ctx.shadowColor = 'rgba(77, 171, 255, 0.4)';
                    ctx.fillText(`x${multiplier}`, 0, 90);
                }
                ctx.restore();
            }

            for (let i = 0; i < notes.length; i++) {
                let note = notes[i];
                if (!note.active) continue;
                
                note.y += speed * (dt / 16);
                
                if (note.type === 'hold' && note.holding) {
                    if (!laneHeld[note.lane]) {
                        // Released early
                        note.active = false;
                        triggerMiss(note.lane);
                        if (lives <= 0) { gameOver(); return; }
                    } else {
                        // Continually holding
                        laneGlows[note.lane] = 1.0;
                        score += 2 * multiplier;
                        document.getElementById('hud-score').innerText = score;
                        if (Math.random() < 0.1) createParticles(note.lane, hitZoneY, colors[note.lane]);
                        
                        let tailY = note.y - note.length;
                        if (tailY >= hitZoneY) { // Note finished!
                            note.active = false;
                            combo++;
                            comboScale = 1.3;
                            updateMultiplier();
                            score += 100 * multiplier;
                            document.getElementById('hud-score').innerText = score;
                            spawnFeedback(note.lane, 'PERFECT', '#2dfc8f');
                            statsPerfect++;
                            playSound('perfect');
                            createExplosion(note.lane, hitZoneY, colors[note.lane]);
                            laneGlows[note.lane] = 2.0; // Intense lane flash
                        }
                    }
                } else {
                    // Standard miss behavior for un-held notes or tap notes
                    let tailY = note.type === 'hold' ? note.y - note.length : note.y;
                    if (tailY > canvas.height + 20) {
                        note.active = false;
                        triggerMiss(note.lane);
                        if (lives <= 0) { gameOver(); return; }
                    }
                }
                
                if (!note.active) continue;

                let x = note.lane * laneWidth + 10;
                let noteW = laneWidth - 20;
                
                if (note.type === 'tap') {
                    drawTapNote(ctx, x, note.y, noteW, colors[note.lane]);
                } else if (note.type === 'hold') {
                    let tailY = note.y - note.length;
                    let headY = note.holding ? Math.min(note.y, hitZoneY) : note.y;
                    let holdHeight = headY - tailY;
                    
                    if (holdHeight > 0) {
                        drawHoldRibbon(ctx, x, tailY, noteW, holdHeight, colors[note.lane], note.holding, time);
                        drawHoldTail(ctx, x, tailY, noteW, colors[note.lane]);
                    }
                    
                    if (!note.holding) {
                        drawTapNote(ctx, x, headY, noteW, colors[note.lane]);
                    } else {
                        drawHoldRing(ctx, x, hitZoneY, noteW, colors[note.lane]);
                    }
                }
            }
            
            notes = notes.filter(n => n.active);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1.0;

            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 8;
                sw.alpha -= 0.04;
                if (sw.alpha <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = sw.alpha;
                ctx.strokeStyle = sw.color;
                ctx.lineWidth = 6 * sw.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = sw.color;
                ctx.beginPath();
                ctx.ellipse(sw.x, sw.y, sw.radius, sw.radius * 0.4, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            for (let i = feedbacks.length - 1; i >= 0; i--) {
                let f = feedbacks[i];
                f.y += f.vy;
                f.life -= 0.03;
                if (f.life <= 0) {
                    feedbacks.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = Math.min(1.0, f.life);
                ctx.fillStyle = f.color;
                let fontSize = Math.floor(24 * (f.scale || 1));
                ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10;
                ctx.shadowColor = f.color;
                ctx.fillText(f.text, f.x, f.y);
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1.0;
            
            if (flashRed > 0) {
                ctx.fillStyle = `rgba(255, 90, 118, ${flashRed * 0.3})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashRed -= 0.05;
            }

            requestAnimationFrame(loop);
        }

        // Keyboard Input
        const keys = ['d', 'f', 'j', 'k'];
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const idx = keys.indexOf(e.key.toLowerCase());
            if (idx !== -1) {
                document.getElementById('btn-' + idx).classList.add('active');
                if (!laneHeld[idx]) {
                    laneHeld[idx] = true;
                    hitLane(idx);
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            const idx = keys.indexOf(e.key.toLowerCase());
            if (idx !== -1) {
                document.getElementById('btn-' + idx).classList.remove('active');
                laneHeld[idx] = false;
            }
        });

        // Touch Input
        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById('btn-' + i);
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                btn.setPointerCapture(e.pointerId);
                btn.classList.add('active');
                if (!laneHeld[i]) {
                    laneHeld[i] = true;
                    hitLane(i);
                }
            });
            btn.addEventListener('pointerup', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                laneHeld[i] = false;
            });
            btn.addEventListener('pointercancel', (e) => {
                btn.classList.remove('active');
                laneHeld[i] = false;
            });
        }
        
        window.onload = () => {
            updateLevelSelector();
            drawEmptyBoard();
        };

        // Global satisfying UI click sounds
        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.start-btn') || e.target.closest('.back-link') || e.target.closest('.level-select')) {
                initAudio();
                playSound('click');
            }
        });
    </script>
</body>
