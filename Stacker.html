<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1b2a 0%, #700b33 100%);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            overflow: hidden;
            text-transform: uppercase;
        }
        
        .header {
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .back-link {
            color: #4dabff;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            transition: color 0.3s;
            margin-bottom: 15px;
        }

        .back-link:hover {
            color: #fff;
            text-shadow: 2px 2px 0 #4dabff;
        }

        /* OS Window & Cabinet Styling */
        .os-window {
            background: #2a2a35;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .title-bar {
            background: linear-gradient(to bottom, #4a4a55, #2a2a35);
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #111;
        }

        .title-bar .dot {
            width: 14px; height: 14px; border-radius: 50%; margin-right: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .dot.close { background: #ff5f56; }
        .dot.min { background: #ffbd2e; }
        .dot.max { background: #27c93f; }

        .cabinet {
            background: #0f131a;
            padding: 25px;
            border-left: 10px solid #0055ff; /* Blue side accents */
            border-right: 10px solid #0055ff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-panel {
            background: #050505;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            border: 3px solid #1a1a1a;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 85, 255, 0.15);
        }

        .top-panel h1 {
            margin: 0;
            color: #00aaff;
            text-shadow: 0 0 10px #00aaff, 0 0 20px #0055ff;
            font-size: 3.8rem;
            letter-spacing: 6px;
        }

        .game-container {
            position: relative;
            border: 4px solid #333;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
        }

        /* Arcade CRT Scanlines */
        .game-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            z-index: 50;
        }

        canvas {
            display: block;
            background: #0f172a;
            image-rendering: pixelated;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .overlay h2 {
            font-size: 3.5rem;
            margin: 0 0 10px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #0b0b1a;
        }

        .overlay p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 40px;
            text-shadow: 1px 1px 0 #0b0b1a;
        }

        .restart-btn {
            background: #e94560;
            border: 3px solid #fff;
            padding: 12px 35px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 4px 4px 0 #0b0b1a;
            transition: all 0.15s ease;
        }

        .restart-btn:hover {
            background: #ff5c77;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #0b0b1a;
        }
        .restart-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #000;
        }

        /* Dark base control panel */
        .control-panel {
            margin-top: 25px;
            background: #0a0d14;
            width: 100%;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #1a1a2e;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.9);
        }

        .s-btn {
            background: radial-gradient(circle at center, #00aaff, #0044cc);
            border: 4px solid #80ccff;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: #fff;
            font-size: 2.8rem;
            font-weight: 900;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 6px 12px rgba(255,255,255,0.4);
            cursor: pointer;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .s-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 8px rgba(0,0,0,0.8), inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .control-text {
            color: #00aaff;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="gamedashboard.html" class="back-link">&larr; Back to Dashboard</a>
    </div>

    <div class="os-window">
        <div class="title-bar">
            <div class="dot close"></div>
            <div class="dot min"></div>
            <div class="dot max"></div>
        </div>
        <div class="cabinet">
            <div class="top-panel">
                <h1>STACKER</h1>
            </div>
            <div class="game-container">
                <canvas id="gameCanvas" width="400" height="600"></canvas>
                
                <div class="overlay" id="start-overlay">
                    <h2 style="color: #4dabff;">Ready?</h2>
                    <p>Press Spacebar to drop perfectly!</p>
                    <button class="restart-btn" onclick="startGame()">Start Game</button>
                </div>

                <div class="overlay" id="end-overlay" style="display: none;">
                    <h2 id="end-title">Game Over</h2>
                    <p id="end-desc">YOU MISSED THE STACK</p>
                    <button class="restart-btn" onclick="startGame()">Play Again</button>
                </div>
            </div>
            <div class="control-panel">
                <div class="s-btn" id="s-button">S</div>
                <div class="control-text">SPACE BAR = STACK</div>
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Grid setup
        const COLS = 10;
        const ROWS = 15;
        const BLOCK_SIZE = 40; // 400px width / 10 cols
        
        let grid = [];
        let currentRow = 0;
        let currentX = 0;
        let currentWidth = 5;
        let direction = 1;
        let lastTime = 0;
        let gameState = 'start'; // start, playing, gameover, victory
        let perfectFlash = 0;
        let particles = [];
        let fallingBlocks = [];
        
        // Everything is now vibrant neon red/plasma
        function getRowColor(row) {
            return '#ff003c';
        }

        // Blocky, pixel-styled drawing function
        function drawBlock(ctx, x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
            
            // Softer 8-bit Bevels
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillRect(x, y, w, 4); // top highlight
            ctx.fillRect(x, y, 4, h); // left highlight
            
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(x, y + h - 4, w, 4); // bottom shadow
            ctx.fillRect(x + w - 4, y, 4, h); // right shadow
            
            // Unit separators
            ctx.strokeStyle = 'rgba(20,0,0,0.6)'; // Darker separators for plasma look
            ctx.lineWidth = 2;
            for(let i = 0; i < w/BLOCK_SIZE; i++) {
                ctx.strokeRect(x + i*BLOCK_SIZE, y, BLOCK_SIZE, h);
            }
        }

        // Audio System
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'ding') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.1);
                osc.frequency.setValueAtTime(600, now + 0.2);
                osc.frequency.setValueAtTime(800, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }

        function startGame() {
            initAudio();
            grid = [];
            currentRow = 0;
            currentWidth = 5;
            currentX = 0;
            direction = 1;
            particles = [];
            fallingBlocks = [];
            gameState = 'playing';
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('end-overlay').style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function getSpeed() {
            if (currentRow <= 3) return 160; // Slow
            if (currentRow <= 7) return 110; // Medium
            if (currentRow <= 11) return 70; // Fast
            return 45; // Very Fast
        }

        function stopBlock() {
            if (gameState !== 'playing') return;
            
            initAudio();
            
            // Snap to nearest grid column for the drop calculation
            const snappedX = Math.round(currentX);

            if (currentRow === 0) {
                // First row is always placed successfully
                grid.push({ x: snappedX, width: currentWidth, color: getRowColor(currentRow) });
                playSound('click');
                currentRow++;
                currentX = direction === 1 ? 0 : COLS - currentWidth;
                return;
            }
            
            const prevRow = grid[currentRow - 1];
            const newX = Math.max(snappedX, prevRow.x);
            const newWidth = Math.min(snappedX + currentWidth, prevRow.x + prevRow.width) - newX;
            
            if (newWidth <= 0) {
                // Missed completely
                fallingBlocks.push({ x: snappedX, y: currentRow, w: currentWidth, color: getRowColor(currentRow), vy: 0 });
                triggerGameOver();
                return;
            }

            // Create falling blocks for cutoff parts
            if (snappedX < prevRow.x) {
                fallingBlocks.push({ x: snappedX, y: currentRow, w: prevRow.x - snappedX, color: getRowColor(currentRow), vy: 0 });
            }
            if (snappedX + currentWidth > prevRow.x + prevRow.width) {
                fallingBlocks.push({ x: prevRow.x + prevRow.width, y: currentRow, w: (snappedX + currentWidth) - (prevRow.x + prevRow.width), color: getRowColor(currentRow), vy: 0 });
            }
            
            if (newWidth === currentWidth) {
                // Perfect alignment
                playSound('ding');
                perfectFlash = 6; // Flash for 6 frames
            } else {
                playSound('click');
            }
            
            currentWidth = newWidth;
            grid.push({ x: newX, width: currentWidth, color: getRowColor(currentRow) });
            
            if (currentRow === ROWS - 1) {
                triggerVictory();
            } else {
                currentRow++;
                direction = Math.random() > 0.5 ? 1 : -1;
                currentX = direction === 1 ? 0 : COLS - currentWidth;
            }
        }

        function triggerGameOver() {
            gameState = 'gameover';
            playSound('lose');
            document.getElementById('end-title').innerText = "Game Over";
            document.getElementById('end-title').style.color = "#ff4c4c";
            document.getElementById('end-desc').innerText = `REACHED ROW ${currentRow + 1}`;
            document.getElementById('end-overlay').style.display = 'flex';
        }

        function triggerVictory() {
            gameState = 'victory';
            playSound('win');
            document.getElementById('end-title').innerText = "Victory!";
            document.getElementById('end-title').style.color = "#4dabff";
            document.getElementById('end-desc').innerText = "STACK COMPLETED";
            document.getElementById('end-overlay').style.display = 'flex';
            
            // Create Confetti
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 1) * 15,
                    color: Math.random() > 0.5 ? '#ff003c' : (Math.random() > 0.5 ? '#ff4d79' : '#ffffff'),
                    size: Math.random() * 6 + 2
                });
            }
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Prevent huge jumps when tab is inactive
            if (deltaTime > 100) deltaTime = 16.66;

            if (gameState === 'start') return;
            
            // Movement Update
            if (gameState === 'playing') {
                currentX += direction * (deltaTime / getSpeed());
                if (currentX <= 0) { currentX = 0; direction = 1; }
                else if (currentX + currentWidth >= COLS) { currentX = COLS - currentWidth; direction = -1; }
            }

            // Drawing
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Faint Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 2;
            for(let i=1; i<COLS; i++) {
                ctx.beginPath(); ctx.moveTo(i * BLOCK_SIZE, 0); ctx.lineTo(i * BLOCK_SIZE, canvas.height); ctx.stroke();
            }
            for(let i=1; i<ROWS; i++) {
                ctx.beginPath(); ctx.moveTo(0, i * BLOCK_SIZE); ctx.lineTo(canvas.width, i * BLOCK_SIZE); ctx.stroke();
            }

            // Draw Locked Stack
            grid.forEach((row, i) => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = row.color;
                drawBlock(ctx, row.x * BLOCK_SIZE, canvas.height - (i + 1) * BLOCK_SIZE, row.width * BLOCK_SIZE, BLOCK_SIZE, row.color);
            });
            
            // Draw Falling Cutoff Blocks
            fallingBlocks.forEach((fb, i) => {
                fb.vy += 0.5; // gravity
                fb.y -= fb.vy * 0.05;
                ctx.shadowBlur = 15;
                ctx.shadowColor = fb.color;
                drawBlock(ctx, fb.x * BLOCK_SIZE, canvas.height - (fb.y + 1) * BLOCK_SIZE, fb.w * BLOCK_SIZE, BLOCK_SIZE, fb.color);
            });

            // Draw Current Moving Block
            if (gameState === 'playing') {
                const color = perfectFlash > 0 ? '#fff' : '#ff003c';
                ctx.shadowBlur = perfectFlash > 0 ? 30 : 15;
                ctx.shadowColor = color;
                drawBlock(ctx, currentX * BLOCK_SIZE, canvas.height - (currentRow + 1) * BLOCK_SIZE, currentWidth * BLOCK_SIZE, BLOCK_SIZE, color);
                ctx.shadowBlur = 0; // Reset blur for other elements
                if (perfectFlash > 0) perfectFlash--;
            }

            // Draw Confetti Particles
            particles.forEach((p, i) => {
                p.vy += 0.2; // gravity
                p.x += p.vx;
                p.y += p.vy;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            
            ctx.shadowBlur = 0; // reset
            requestAnimationFrame(gameLoop);
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') stopBlock();
                else if (gameState !== 'start') startGame(); // Space to restart if game over
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameState === 'playing') stopBlock();
            else if (gameState !== 'start') startGame();
        });

        document.getElementById('s-button').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameState === 'playing') stopBlock();
            else if (gameState !== 'start') startGame();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') stopBlock();
            else if (gameState !== 'start') startGame();
        }, { passive: false });

    </script>
</body>
</html>
