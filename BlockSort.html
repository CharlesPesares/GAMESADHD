<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Sort</title>
    <style>
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .back-link {
            color: #a6c1ee;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            transition: color 0.3s;
            margin-bottom: 15px;
        }

        .back-link:hover {
            color: #fbc2eb;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 600px;
            margin-bottom: 30px;
            background: #1a252f;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            box-sizing: border-box;
        }

        .level-info h2 {
            margin: 0;
            color: #fbc2eb;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 20px;
            color: #1a252f;
            cursor: pointer;
            box-shadow: 0 4px 0 #d67d81, 0 10px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d67d81, 0 5px 10px rgba(0,0,0,0.3);
        }

        .tubes-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px 25px; /* 50px row gap for pop-ups, 25px column gap */
            max-width: 900px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .tube {
            width: 70px;
            height: 270px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: none;
            border-radius: 0 0 35px 35px;
            display: flex;
            flex-direction: column-reverse; /* Stacks items from bottom to top */
            align-items: center;
            gap: 5px;
            padding: 6px;
            padding-top: 40px; /* Space for popping animation */
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.15));
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }

        .tube:hover {
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-5px);
        }

        .tube::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.5);
        }

        .block {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            flex-shrink: 0;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.5), inset 0 -5px 10px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.4);
        }

        .block.selected {
            transform: translateY(-40px);
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.6), inset 0 -5px 10px rgba(0,0,0,0.3), 0 15px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        /* Win Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay h2 {
            font-size: 4rem;
            color: #a6c1ee;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #a6c1ee;
            text-align: center;
        }

        .next-btn {
            background: linear-gradient(135deg, #a6c1ee 0%, #fbc2eb 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 30px;
            color: #1a252f;
            cursor: pointer;
            box-shadow: 0 6px 0 #8fa7d4, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8fa7d4, 0 5px 10px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="gamedashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>Block Sort</h1>
    </div>

    <div class="level-info">
        <h2 id="level-display">Level 1</h2>
        <button class="restart-btn" onclick="restartLevel()">Restart Level</button>
    </div>

    <div id="tubes-container" class="tubes-container"></div>

    <div class="overlay" id="overlay">
        <h2 id="overlay-title">Level Cleared!</h2>
        <button class="next-btn" id="overlay-btn" onclick="nextLevel()">NEXT LEVEL</button>
    </div>

    <script>
        // Vibrant 3D Gradients mapped to colors
        const COLORS = [
            { bg: "radial-gradient(circle at 30% 30%, #ff7675, #d63031)" }, // Red
            { bg: "radial-gradient(circle at 30% 30%, #74b9ff, #0984e3)" }, // Blue
            { bg: "radial-gradient(circle at 30% 30%, #55efc4, #00b894)" }, // Green
            { bg: "radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e)" }, // Yellow
            { bg: "radial-gradient(circle at 30% 30%, #a29bfe, #6c5ce7)" }, // Purple
            { bg: "radial-gradient(circle at 30% 30%, #fab1a0, #e17055)" }, // Orange
            { bg: "radial-gradient(circle at 30% 30%, #81ecec, #00cec9)" }, // Teal
            { bg: "radial-gradient(circle at 30% 30%, #fd79a8, #e84393)" }, // Pink
            { bg: "radial-gradient(circle at 30% 30%, #636e72, #2d3436)" }, // Dark Blue
            { bg: "radial-gradient(circle at 30% 30%, #e1b12c, #c23616)" }, // Brown
            { bg: "radial-gradient(circle at 30% 30%, #badc58, #6ab04c)" }, // Lime
            { bg: "radial-gradient(circle at 30% 30%, #e056fd, #be2edd)" }  // Magenta
        ];

        let currentLevel = localStorage.getItem('blockSortLevel') ? parseInt(localStorage.getItem('blockSortLevel')) : 1;
        let tubes = [];
        let initialTubes = []; // Saves the starting state of the level to allow restarting
        let selectedTubeIndex = -1;
        let isPlaying = true;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Procedurally generate a solvable level layout by shuffling it backward from a solved state
        function generateLevel(level) {
            // Gradually increase colors up to a max of 12 by level 100
            let numColors = Math.min(12, 2 + Math.floor((level - 1) / 10));
            let numEmpty = 2; // Always keep 2 empty tubes to ensure playability
            let capacity = 4;
            let state = [];

            // Loop until we generate a state that isn't already solved
            do {
                state = [];
                for (let c = 0; c < numColors; c++) {
                    let tube = [];
                    for (let i = 0; i < capacity; i++) tube.push(c);
                    state.push(tube);
                }
                for (let e = 0; e < numEmpty; e++) {
                    state.push([]);
                }

                let scrambleMoves = 40 + level * 4; 
                let lastSource = -1;
                let lastDest = -1;

                for (let i = 0; i < scrambleMoves; i++) {
                    let validSources = [];
                    for (let t = 0; t < state.length; t++) {
                        if (state[t].length > 0) validSources.push(t);
                    }
                    if (validSources.length === 0) break;
                    
                    let source = validSources[Math.floor(Math.random() * validSources.length)];

                    let validDests = [];
                    for (let t = 0; t < state.length; t++) {
                        if (state[t].length < capacity && t !== source) {
                            // Try to prevent immediate undo to get a deeper shuffle
                            if (!(source === lastDest && t === lastSource)) {
                                validDests.push(t);
                            }
                        }
                    }

                    if (validDests.length === 0) {
                        for (let t = 0; t < state.length; t++) {
                            if (state[t].length < capacity && t !== source) {
                                validDests.push(t);
                            }
                        }
                    }

                    if (validDests.length > 0) {
                        let dest = validDests[Math.floor(Math.random() * validDests.length)];
                        state[dest].push(state[source].pop());
                        lastSource = source;
                        lastDest = dest;
                    }
                }
            } while(isSolved(state));

            return state;
        }

        function isSolved(state) {
            for (let tube of state) {
                if (tube.length === 0) continue;
                if (tube.length !== 4) return false;
                const c = tube[0];
                for (let x of tube) if (x !== c) return false;
            }
            return true;
        }

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'select') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.1);
                osc.frequency.setValueAtTime(600, now + 0.2);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.setValueAtTime(0.3, now + 0.4);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function render() {
            const container = document.getElementById('tubes-container');
            container.innerHTML = '';
            
            tubes.forEach((tube, index) => {
                const tubeEl = document.createElement('div');
                tubeEl.className = 'tube';
                tubeEl.onclick = () => handleTubeClick(index);
                
                tube.forEach((colorIdx, blockIdx) => {
                    const blockEl = document.createElement('div');
                    blockEl.className = 'block';
                    blockEl.style.background = COLORS[colorIdx].bg;
                    
                    if (index === selectedTubeIndex && blockIdx === tube.length - 1) {
                        blockEl.classList.add('selected');
                    }
                    
                    tubeEl.appendChild(blockEl);
                });
                
                container.appendChild(tubeEl);
            });
        }

        function handleTubeClick(index) {
            if (!isPlaying) return;

            if (selectedTubeIndex === -1) {
                if (tubes[index].length > 0) {
                    selectedTubeIndex = index;
                    playSound('select');
                    render();
                }
            } else {
                if (selectedTubeIndex === index) {
                    selectedTubeIndex = -1;
                    playSound('drop');
                    render();
                } else {
                    const sourceTube = tubes[selectedTubeIndex];
                    const destTube = tubes[index];
                    
                    if (destTube.length < 4) {
                        const blockColor = sourceTube[sourceTube.length - 1];
                        const destTopColor = destTube.length > 0 ? destTube[destTube.length - 1] : null;
                        
                        if (destTube.length === 0 || destTopColor === blockColor) {
                            destTube.push(sourceTube.pop());
                            selectedTubeIndex = -1;
                            playSound('drop');
                            render();
                            
                            if (isSolved(tubes)) {
                                isPlaying = false;
                                setTimeout(() => {
                                    playSound('win');
                                    winLevel();
                                }, 250);
                            }
                        } else {
                            selectedTubeIndex = index;
                            playSound('select');
                            render();
                        }
                    } else {
                        selectedTubeIndex = index;
                        playSound('select');
                        render();
                    }
                }
            }
        }

        function winLevel() {
            let beatGame = false;
            if (currentLevel === 100) {
                beatGame = true;
                currentLevel = 1;
            } else {
                currentLevel++;
            }
            
            localStorage.setItem('blockSortLevel', currentLevel);
            
            document.getElementById('overlay-title').innerText = beatGame ? "You Beat All 100 Levels!" : "Level Cleared!";
            document.getElementById('overlay-btn').innerText = beatGame ? "PLAY AGAIN" : "NEXT LEVEL";
            document.getElementById('overlay').style.display = 'flex';
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            loadLevel(currentLevel);
        }

        function restartLevel() {
            if (!isPlaying && isSolved(tubes)) return; // Prevent restarting during the win overlay
            tubes = initialTubes.map(tube => [...tube]);
            selectedTubeIndex = -1;
            isPlaying = true;
            render();
        }

        function loadLevel(level) {
            tubes = generateLevel(level);
            initialTubes = tubes.map(tube => [...tube]);
            selectedTubeIndex = -1;
            isPlaying = true;
            document.getElementById('level-display').innerText = `Level ${level}`;
            render();
        }

        window.onload = () => loadLevel(currentLevel);

    </script>
</body>
</html>
