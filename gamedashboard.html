<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-color: #040812;
            background-image: radial-gradient(rgba(255, 255, 255, 0.04) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            color: #fff;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            width: 200vw;
            height: 200vh;
            top: -50vh;
            left: -50vw;
            z-index: -2;
            pointer-events: none;
        }

        body::before {
            background: 
                radial-gradient(circle at 30% 40%, rgba(77, 171, 255, 0.4), transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(255, 90, 118, 0.3), transparent 40%),
                radial-gradient(circle at 50% 20%, rgba(166, 193, 238, 0.3), transparent 30%);
            filter: blur(80px);
            animation: drift1 25s infinite linear;
        }

        body::after {
            background: 
                radial-gradient(circle at 60% 30%, rgba(45, 252, 143, 0.25), transparent 40%),
                radial-gradient(circle at 40% 70%, rgba(255, 209, 102, 0.25), transparent 40%);
            filter: blur(80px);
            animation: drift2 35s infinite reverse linear;
            z-index: -3;
        }
        
        @keyframes drift1 {
            0% { transform: rotate(0deg) translate(5vw, 5vh) scale(1); }
            50% { transform: rotate(180deg) translate(-5vw, -10vh) scale(1.1); }
            100% { transform: rotate(360deg) translate(5vw, 5vh) scale(1); }
        }

        @keyframes drift2 {
            0% { transform: rotate(0deg) translate(-10vw, 10vh) scale(1.1); }
            50% { transform: rotate(180deg) translate(10vw, -5vh) scale(1); }
            100% { transform: rotate(360deg) translate(-10vw, 10vh) scale(1.1); }
        }

        .nav-hint {
            position: absolute;
            top: 135px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: pulseHint 2.5s infinite ease-in-out;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .eyebrow {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffd166;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 209, 102, 0.5);
            z-index: 10;
        }

        .welcome-text {
            position: absolute;
            top: 65px;
            left: 0;
            right: 0;
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin: 0;
            font-weight: 950;
            letter-spacing: -1px;
            text-align: center;
            z-index: 10;
            background: linear-gradient(to bottom, #ffffff, #a6c1ee);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 30px rgba(166, 193, 238, 0.3));
        }

        .selected-game-display {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            background: rgba(11, 16, 22, 0.65);
            padding: 12px 45px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        #selected-game-title {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(77, 171, 255, 0.8), 0 0 30px rgba(45, 252, 143, 0.4);
        }

        .gallery-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            margin-top: 0;
        }
        .circular-gallery {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        .circular-gallery:active {
            cursor: grabbing;
        }
        
        .play-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4dabff, #2dfc8f);
            border: none;
            padding: 18px 48px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            color: #0b1016;
            cursor: pointer;
            box-shadow: 0 8px 0 #1b7a63, 0 20px 30px rgba(0,0,0,0.5), 0 0 30px rgba(45, 252, 143, 0.4);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
            z-index: 10;
            pointer-events: auto;
            letter-spacing: 0.1em;
        }
        .play-btn:active {
            transform: translate(-50%, 6px);
            box-shadow: 0 2px 0 #1b7a63, 0 10px 15px rgba(0,0,0,0.5), 0 0 15px rgba(45, 252, 143, 0.4);
        }
        .play-btn:hover {
            filter: brightness(1.15);
        }

        #dust-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Player Database Styles */
        .profile-btn {
            position: absolute;
            top: 30px;
            right: clamp(16px, 4vw, 40px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 999px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .leaderboard-btn {
            position: absolute;
            top: 80px;
            right: clamp(16px, 4vw, 40px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 999px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .leaderboard-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4dabff;
            color: #4dabff;
            transform: translateY(-2px);
        }
        .db-modal {
            position: fixed;
            inset: 0;
            background: rgba(4, 8, 18, 0.85);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .db-modal-content {
            background: linear-gradient(145deg, #172330, #0b1016);
            border: 1px solid rgba(77, 171, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
        }
        .db-input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .db-input:focus {
            border-color: #4dabff;
            box-shadow: 0 0 15px rgba(77, 171, 255, 0.3);
        }

        /* Trophy Room Styles */
        .trophy-btn {
            position: absolute;
            top: 30px;
            left: clamp(16px, 4vw, 40px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 999px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .trophy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 209, 102, 0.6);
            color: #ffd166;
            transform: translateY(-2px);
        }
        .trophy-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            opacity: 0.5;
            filter: grayscale(1);
            transition: all 0.3s;
        }
        .trophy-card.unlocked {
            opacity: 1;
            filter: grayscale(0);
            background: linear-gradient(145deg, rgba(255,209,102,0.15), rgba(0,0,0,0.4));
            border-color: rgba(255,209,102,0.5);
            box-shadow: 0 0 15px rgba(255,209,102,0.15);
        }
        .trophy-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
        .trophy-title { font-size: 0.9rem; font-weight: 800; color: #fff; margin: 0 0 5px 0; }
        .trophy-desc { font-size: 0.75rem; color: #bdc3c7; margin: 0; line-height: 1.3; }
        
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
            .trophy-btn, .profile-btn, .leaderboard-btn { padding: 10px; }
        }
    </style>
</head>
<body>

            <h2 id="selected-game-title">Loading...</h2>

        <button class="play-btn" id="play-btn">PLAY SELECTED</button>

    <script>
        // Floating Dust/Stars Particle System
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.5 + 0.5,
                dx: (Math.random() - 0.5) * 0.4,
                dy: (Math.random() - 0.5) * 0.4,
                opacity: Math.random()
            });
        }

        function drawDust() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#ffffff';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.dx;
                p.y += p.dy;
                
                // Wrap around edges
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                // Twinkle effect
                p.opacity += (Math.random() - 0.5) * 0.05;
                if (p.opacity < 0.1) p.opacity = 0.1;
                if (p.opacity > 0.8) p.opacity = 0.8;
            });
            requestAnimationFrame(drawDust);
        }
        drawDust();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>

    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyANOX_HyzFEzL_0ky8jW-O8Zj-YzpXUdaY",
            authDomain: "omnicade-af880.firebaseapp.com",
            projectId: "omnicade-af880",
            storageBucket: "omnicade-af880.firebasestorage.app",
            messagingSenderId: "477552992684",
            appId: "1:477552992684:web:2ee7e254c3b6803e54da09",
            measurementId: "G-Q7Y2T3XK4D"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // Two-Way Sync for Achievements & High Scores
        async function syncPlayerProfile(playerName) {
            if (!playerName || playerName === 'Guest') return;
            try {
                const playerRef = doc(db, "players", playerName);
                const docSnap = await getDoc(playerRef);

                let cloudData = docSnap.exists() ? docSnap.data() : {};
                let cloudAchievements = cloudData.achievements || {};
                let cloudScores = cloudData.highScores || {};

                let localAchievements = JSON.parse(localStorage.getItem('arcade_achievements')) || {};
                let localScores = {
                    simonBestLevel: parseInt(localStorage.getItem('simonBestLevel')) || 0,
                    orbitPopMaxLevel: parseInt(localStorage.getItem('orbitPopMaxLevel')) || 1,
                    colorSortMaxLevel: parseInt(localStorage.getItem('colorSortMaxLevel')) || 1
                };

                let mergedAchievements = { ...cloudAchievements, ...localAchievements };
                let mergedScores = {
                    simonBestLevel: Math.max(cloudScores.simonBestLevel || 0, localScores.simonBestLevel),
                    orbitPopMaxLevel: Math.max(cloudScores.orbitPopMaxLevel || 1, localScores.orbitPopMaxLevel),
                    colorSortMaxLevel: Math.max(cloudScores.colorSortMaxLevel || 1, localScores.colorSortMaxLevel)
                };

                // Update Local Storage with the highest/merged values
                localStorage.setItem('arcade_achievements', JSON.stringify(mergedAchievements));
                localStorage.setItem('simonBestLevel', mergedScores.simonBestLevel);
                localStorage.setItem('orbitPopMaxLevel', mergedScores.orbitPopMaxLevel);
                localStorage.setItem('colorSortMaxLevel', mergedScores.colorSortMaxLevel);

                // Push the newly merged master record back up to the Cloud
                await setDoc(playerRef, { achievements: mergedAchievements, highScores: mergedScores }, { merge: true });
            } catch (e) {
                console.error("Cloud sync failed:", e);
            }
        }

        // Player Database & Profile System
        const profileBtn = document.getElementById('profile-btn');
        const dbModal = document.getElementById('db-modal');
        const closeDbBtn = document.getElementById('close-db-btn');
        const savePlayerBtn = document.getElementById('save-player-btn');
        const playerNameInput = document.getElementById('player-name-input');
        const currentPlayerName = document.getElementById('current-player-name');

        // Load saved player from local database
        let currentPlayer = localStorage.getItem('currentPlayer') || 'Guest';
        currentPlayerName.innerText = currentPlayer;

        profileBtn.addEventListener('click', () => {
            playerNameInput.value = currentPlayer === 'Guest' ? '' : currentPlayer;
            dbModal.style.display = 'flex';
            playerNameInput.focus();
        });

        closeDbBtn.addEventListener('click', () => {
            dbModal.style.display = 'none';
        });

        savePlayerBtn.addEventListener('click', async () => {
            const name = playerNameInput.value.trim() || 'Guest';
            currentPlayer = name;
            
            localStorage.setItem('currentPlayer', currentPlayer);
            currentPlayerName.innerText = currentPlayer;
            
            // Sync with Firestore Cloud Database
            if (currentPlayer !== 'Guest') {
                savePlayerBtn.innerText = "SYNCING TO CLOUD...";
                await syncPlayerProfile(currentPlayer);
                savePlayerBtn.innerText = "SAVE PROFILE";
            }
            dbModal.style.display = 'none';
        });

        // Allow pressing Enter to save
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') savePlayerBtn.click();
        });

        // Trophy Room Logic
        const achievementsList = [
            { id: 'simon_5', icon: '🧠', title: 'Brain Warmup', desc: 'Reach Level 5 in Simon Says' },
            { id: 'simon_10', icon: '🔥', title: 'On Fire', desc: 'Reach Level 10 in Simon Says' },
            { id: 'simon_time', icon: '⏱️', title: 'Tick Tock', desc: 'Play Time Attack Mode' },
            { id: 'hammer_win', icon: '👑', title: 'Gladiator', desc: 'Win a match in Hammer & Shield' },
            { id: 'wobble_key', icon: '🗝️', title: 'Keymaster', desc: 'Collect the key in Wobble Ball' },
            { id: 'color_sort', icon: '🧪', title: 'Scientist', desc: 'Solve a Color Sort puzzle' },
            { id: 'orbit_10', icon: '🪐', title: 'Orbit Cleared', desc: 'Reach Level 10 in Orbit Pop' }
        ];

        const trophyModal = document.getElementById('trophy-modal');
        const trophyGrid = document.getElementById('trophy-grid');

        document.getElementById('trophy-btn').addEventListener('click', async () => {
            // Refresh from cloud before opening if logged in
            if (currentPlayer !== 'Guest') {
                await syncPlayerProfile(currentPlayer);
            }

            const unlocked = JSON.parse(localStorage.getItem('arcade_achievements')) || {};
            trophyGrid.innerHTML = '';
            achievementsList.forEach(ach => {
                const isUnlocked = unlocked[ach.id];
                trophyGrid.innerHTML += `
                    <div class="trophy-card ${isUnlocked ? 'unlocked' : ''}">
                        <span class="trophy-icon">${ach.icon}</span>
                        <h4 class="trophy-title">${ach.title}</h4>
                        <p class="trophy-desc">${ach.desc}</p>
                    </div>
                `;
            });
            trophyModal.style.display = 'flex';
        });

        document.getElementById('close-trophy-btn').addEventListener('click', () => {
            trophyModal.style.display = 'none';
        });

        // Global Leaderboard Logic
        const leaderboardBtn = document.getElementById('leaderboard-btn');
        const leaderboardModal = document.getElementById('leaderboard-modal');
        const closeLeaderboardBtn = document.getElementById('close-leaderboard-btn');
        const leaderboardGameSelect = document.getElementById('leaderboard-game-select');
        const leaderboardList = document.getElementById('leaderboard-list');

        async function fetchLeaderboard(gameKey) {
            leaderboardList.innerHTML = '<div style="text-align:center; color:#a6c1ee; font-weight:bold; padding: 20px;">Fetching from Cloud...</div>';
            try {
                const q = query(collection(db, "players"), orderBy(`highScores.${gameKey}`, "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                let html = '';
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const score = data.highScores && data.highScores[gameKey] ? data.highScores[gameKey] : 0;
                    if (score > 0) {
                        const color = rank === 1 ? '#ffd166' : rank === 2 ? '#bdc3c7' : rank === 3 ? '#cd7f32' : '#ffffff';
                        html += `
                            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); margin-bottom: 5px; border-radius: 8px;">
                                <span style="font-weight: 900; color: ${color}; font-size: 1.1rem;">#${rank} ${doc.id}</span>
                                <span style="color: #4dabff; font-weight: 900; font-size: 1.3rem;">Level ${score}</span>
                            </div>`;
                        rank++;
                    }
                });
                if (html === '') html = '<div style="text-align:center; color:#bdc3c7; padding: 20px;">No high scores posted yet!</div>';
                leaderboardList.innerHTML = html;
            } catch(e) {
                console.error("Leaderboard fetch error:", e);
                leaderboardList.innerHTML = `<div style="text-align:center; color:#ff5a76; padding: 20px; font-size: 0.9rem;"><strong>Database Error:</strong><br>${e.message}</div>`;
            }
        }

        leaderboardBtn.addEventListener('click', () => {
            leaderboardModal.style.display = 'flex';
            fetchLeaderboard(leaderboardGameSelect.value);
        });

        closeLeaderboardBtn.addEventListener('click', () => {
            leaderboardModal.style.display = 'none';
        });

        leaderboardGameSelect.addEventListener('change', (e) => {
            fetchLeaderboard(e.target.value);
        });
    </script>

    <script type="module">
        import { Camera, Mesh, Plane, Program, Renderer, Texture, Transform } from 'https://esm.sh/ogl@0.0.117';

        // Setup Audio Context for high-tech UI hover sounds and BGM
        let audioCtx;
        let bgmStarted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => startAmbientBGM()).catch(() => {});
            } else {
                startAmbientBGM();
            }
        }

        function startAmbientBGM() {
            if (bgmStarted || !audioCtx) return;
            bgmStarted = true;

            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.05; // Quiet, relaxing ambient volume
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 500; // Deep, muffled sound
            
            masterGain.connect(filter);
            filter.connect(audioCtx.destination);

            // Synth Pad Chords (Fmaj7 -> Cmaj7)
            const chords = [
                [87.31, 130.81, 164.81, 220.00],
                [65.41, 130.81, 164.81, 196.00]
            ];
            let step = 0;

            function playChord() {
                const now = audioCtx.currentTime;
                const chord = chords[step % chords.length];
                
                chord.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = freq;
                    
                    // Slow sweep effect to give it an evolving, airy feel
                    osc.detune.setValueAtTime(-8, now);
                    osc.detune.linearRampToValueAtTime(8, now + 4);
                    osc.detune.linearRampToValueAtTime(-8, now + 8);
                    
                    const env = audioCtx.createGain();
                    env.gain.setValueAtTime(0, now);
                    env.gain.linearRampToValueAtTime(1 / chord.length, now + 3); // Slow fade-in
                    env.gain.linearRampToValueAtTime(0, now + 9);                 // Slow fade-out
                    
                    osc.connect(env);
                    env.connect(masterGain);
                    
                    osc.start(now);
                    osc.stop(now + 9);
                });
                
                step++;
                setTimeout(playChord, 6000); // Crossfade to the next chord every 6 seconds
            }
            
            playChord();
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function lerp(p1, p2, t) {
            return p1 + (p2 - p1) * t;
        }

        function autoBind(instance) {
            const proto = Object.getPrototypeOf(instance);
            Object.getOwnPropertyNames(proto).forEach(key => {
                if (key !== 'constructor' && typeof instance[key] === 'function') {
                    instance[key] = instance[key].bind(instance);
                }
            });
        }

        function createTextTexture(gl, text, font = 'bold 40px sans-serif', color = '#ffffff') {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            context.font = font;
            const metrics = context.measureText(text);
            const textWidth = Math.ceil(metrics.width);
            const textHeight = Math.ceil(parseInt(font, 10) * 1.2);
            canvas.width = textWidth + 40;
            canvas.height = textHeight + 40;
            context.font = font;
            context.fillStyle = color;
            context.textBaseline = 'middle';
            context.textAlign = 'center';
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Add text shadow for better visibility
            context.shadowColor = 'rgba(0, 0, 0, 0.8)';
            context.shadowBlur = 10;
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;
            
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new Texture(gl, { generateMipmaps: false });
            texture.image = canvas;
            return { texture, width: canvas.width, height: canvas.height };
        }

        class Title {
            constructor({ gl, plane, renderer, text, textColor = '#ffffff', font = 'bold 40px sans-serif' }) {
                autoBind(this);
                this.gl = gl;
                this.plane = plane;
                this.renderer = renderer;
                this.text = text;
                this.textColor = textColor;
                this.font = font;
                this.createMesh();
            }
            createMesh() {
                const { texture, width, height } = createTextTexture(this.gl, this.text, this.font, this.textColor);
                const geometry = new Plane(this.gl);
                const program = new Program(this.gl, {
                    vertex: `
                        attribute vec3 position;
                        attribute vec2 uv;
                        uniform mat4 modelViewMatrix;
                        uniform mat4 projectionMatrix;
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragment: `
                        precision highp float;
                        uniform sampler2D tMap;
                        varying vec2 vUv;
                        void main() {
                            vec4 color = texture2D(tMap, vUv);
                            if (color.a < 0.1) discard;
                            gl_FragColor = color;
                        }
                    `,
                    uniforms: { tMap: { value: texture } },
                    transparent: true
                });
                this.mesh = new Mesh(this.gl, { geometry, program });
                const aspect = width / height;
                const textHeight = this.plane.scale.y * 0.15;
                const textWidth = textHeight * aspect;
                this.mesh.scale.set(textWidth, textHeight, 1);
                this.mesh.position.y = -this.plane.scale.y * 0.5 - textHeight * 0.5 - 0.05;
                this.mesh.setParent(this.plane);
            }
        }

        class Media {
            constructor({ geometry, gl, image, index, length, renderer, scene, screen, text, viewport, bend, textColor, borderRadius = 0, font }) {
                this.loopOffset = 0;
                this.geometry = geometry;
                this.gl = gl;
                this.image = image;
                this.index = index;
                this.length = length;
                this.renderer = renderer;
                this.scene = scene;
                this.screen = screen;
                this.text = text;
                this.viewport = viewport;
                this.bend = bend;
                this.textColor = textColor;
                this.borderRadius = borderRadius;
                this.font = font;
                this.createShader();
                this.createMesh();
                this.createTitle();
                this.onResize();
            }
            createShader() {
                const texture = new Texture(this.gl, { generateMipmaps: true });
                this.program = new Program(this.gl, {
                    depthTest: false,
                    depthWrite: false,
                    vertex: `
                        precision highp float;
                        attribute vec3 position;
                        attribute vec2 uv;
                        uniform mat4 modelViewMatrix;
                        uniform mat4 projectionMatrix;
                        uniform float uTime;
                        uniform float uSpeed;
                        varying vec2 vTexCoord;
                        void main() {
                            vTexCoord = uv;
                            vec3 pos = position;
                            float waveDist = sin(pos.x * 4.0 + uTime) * 1.5 + cos(pos.y * 2.0 + uTime) * 1.5;
                            pos.z = waveDist * (0.1 + uSpeed * 0.5);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                        }
                    `,
                    fragment: `
                        precision highp float;
                        uniform vec2 uImageSizes;
                        uniform vec2 uPlaneSizes;
                        uniform sampler2D tMap;
                        uniform float uBorderRadius;
                        varying vec2 vTexCoord;
                        
                        float calcRoundedRect(vec2 p, vec2 size, float rad) {
                            vec2 dist = abs(p) - size;
                            return length(max(dist, vec2(0.0))) + min(max(dist.x, dist.y), 0.0) - rad;
                        }
                        
                        void main() {
                            vec2 ratio = vec2(
                                min((uPlaneSizes.x / uPlaneSizes.y) / (max(uImageSizes.x, 1.0) / max(uImageSizes.y, 1.0)), 1.0),
                                min((uPlaneSizes.y / uPlaneSizes.x) / (max(uImageSizes.y, 1.0) / max(uImageSizes.x, 1.0)), 1.0)
                            );
                            vec2 uvCoord = vec2(
                                vTexCoord.x * ratio.x + (1.0 - ratio.x) * 0.5,
                                vTexCoord.y * ratio.y + (1.0 - ratio.y) * 0.5
                            );
                            vec4 color = texture2D(tMap, uvCoord);
                            
                            float dist = calcRoundedRect(vTexCoord - 0.5, vec2(0.5 - uBorderRadius), uBorderRadius);
                            
                            float edgeSmooth = 0.002;
                            float alpha = 1.0 - smoothstep(-edgeSmooth, edgeSmooth, dist);
                            
                            gl_FragColor = vec4(color.rgb, alpha);
                        }
                    `,
                    uniforms: {
                        tMap: { value: texture },
                        uPlaneSizes: { value: [0, 0] },
                        uImageSizes: { value: [0, 0] },
                        uSpeed: { value: 0 },
                        uTime: { value: 100 * Math.random() },
                        uBorderRadius: { value: this.borderRadius }
                    },
                    transparent: true
                });
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = this.image;
                img.onload = () => {
                    texture.image = img;
                    this.program.uniforms.uImageSizes.value = [img.naturalWidth, img.naturalHeight];
                };
            }
            createMesh() {
                this.plane = new Mesh(this.gl, { geometry: this.geometry, program: this.program });
                this.plane.setParent(this.scene);
            }
            createTitle() {
                this.title = new Title({
                    gl: this.gl,
                    plane: this.plane,
                    renderer: this.renderer,
                    text: this.text,
                    textColor: this.textColor,
                    font: this.font
                });
            }
            update(scroll, direction) {
                this.plane.position.x = this.baseX - scroll.current - this.loopOffset;

                const x = this.plane.position.x;
                const H = this.viewport.width / 2;

                if (this.bend === 0) {
                    this.plane.position.y = 0;
                    this.plane.rotation.z = 0;
                } else {
                    const B_abs = Math.abs(this.bend);
                    const R = (H * H + B_abs * B_abs) / (2 * B_abs);
                    const effectiveX = Math.min(Math.abs(x), H);

                    const arc = R - Math.sqrt(R * R - effectiveX * effectiveX);
                    if (this.bend > 0) {
                        this.plane.position.y = -arc;
                        this.plane.rotation.z = -Math.sign(x) * Math.asin(effectiveX / R);
                    } else {
                        this.plane.position.y = arc;
                        this.plane.rotation.z = Math.sign(x) * Math.asin(effectiveX / R);
                    }
                }

                this.speed = scroll.current - scroll.last;
                this.program.uniforms.uTime.value += 0.04;
                this.program.uniforms.uSpeed.value = this.speed;

                const planeOffset = this.plane.scale.x / 2;
                const viewportOffset = this.viewport.width / 2;
                this.isBefore = this.plane.position.x + planeOffset < -viewportOffset;
                this.isAfter = this.plane.position.x - planeOffset > viewportOffset;
                if (direction === 'right' && this.isBefore) {
                    this.loopOffset -= this.totalScrollWidth;
                    this.isBefore = this.isAfter = false;
                }
                if (direction === 'left' && this.isAfter) {
                    this.loopOffset += this.totalScrollWidth;
                    this.isBefore = this.isAfter = false;
                }
            }
            onResize({ screen, viewport } = {}) {
                if (screen) this.screen = screen;
                if (viewport) {
                    this.viewport = viewport;
                    if (this.plane.program.uniforms.uViewportSizes) {
                        this.plane.program.uniforms.uViewportSizes.value = [this.viewport.width, this.viewport.height];
                    }
                }
                
                const screenRatio = this.screen.height / 1500;
                
                this.plane.scale.set(
                    (this.viewport.width * (500 * screenRatio)) / this.screen.width,
                    (this.viewport.height * (700 * screenRatio)) / this.screen.height,
                    1
                );

                this.plane.program.uniforms.uPlaneSizes.value = [this.plane.scale.x, this.plane.scale.y];
                
                this.itemWidth = this.plane.scale.x + 2;
                this.totalScrollWidth = this.itemWidth * this.length;
                this.baseX = this.itemWidth * this.index;
            }
        }

        class App {
            constructor(container, { items, bend, textColor = '#ffffff', borderRadius = 0, font, scrollSpeed = 2, scrollEase = 0.05 } = {}) {
                this.container = container;
                this.scrollSpeed = scrollSpeed;
                this.scroll = { ease: scrollEase, current: 0, target: 0, last: 0 };
                this.onCheckDebounce = debounce(this.onCheck, 200);
                this.createRenderer();
                this.createCamera();
                this.createScene();
                this.onResize();
                this.createGeometry();
                this.createMedias(items, bend, textColor, borderRadius, font);
                this.update();
                this.addEventListeners();
                this.dragDistance = 0;

                this.isAutoScrolling = false;
                this.inactivityTimer = null;
            }
            resetInactivityTimer() {
                clearTimeout(this.inactivityTimer);
                this.isAutoScrolling = false;
                this.inactivityTimer = setTimeout(() => { this.isAutoScrolling = true; }, 5000); // 5 seconds
            }
            createRenderer() {
                this.renderer = new Renderer({ alpha: true, antialias: true, dpr: Math.min(window.devicePixelRatio || 1, 2) });
                this.gl = this.renderer.gl;
                this.gl.clearColor(0, 0, 0, 0);
                this.container.appendChild(this.gl.canvas);
            }
            createCamera() {
                this.camera = new Camera(this.gl);
                this.camera.fov = 45;
                this.camera.position.z = 20;
            }
            createScene() {
                this.scene = new Transform();
            }
            createGeometry() {
                this.planeGeometry = new Plane(this.gl, { heightSegments: 50, widthSegments: 100 });
            }
            createMedias(items, bend = 1, textColor, borderRadius, font) {
                this.mediasImages = items.concat(items); // duplicate to loop properly
                this.medias = this.mediasImages.map((data, index) => {
                    return new Media({
                        geometry: this.planeGeometry, gl: this.gl, image: data.image, index,
                        length: this.mediasImages.length, renderer: this.renderer, scene: this.scene,
                        screen: this.screen, text: data.text, viewport: this.viewport,
                        bend, textColor, borderRadius, font
                    });
                });
            }
            onTouchDown(e) {
                initAudio();
                this.resetInactivityTimer();
                this.isDragging = true;
                this.scroll.position = this.scroll.current;
                this.dragStartPos = e.touches ? e.touches[0].clientX : e.clientX;
                this.dragDistance = 0;
            }
            onTouchMove(e) {
                if (!this.isDragging) return;
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const dx = this.dragStartPos - x;
                this.dragDistance += Math.abs(dx);
                const distance = dx * (this.scrollSpeed * 0.025);
                this.scroll.target = this.scroll.position + distance;
            }
            onTouchUp() {
                if (!this.isDragging) return;
                this.isDragging = false;
                this.onCheck();
                this.resetInactivityTimer();
                
                // Handle clicking a card directly
                if (this.dragDistance < 10) {
                    const centered = this.getCenteredItem();
                    if (centered && centered.url) {
                        window.location.href = centered.url;
                    }
                }
            }
            onKeyDown(e) {
                if (!this.medias || !this.medias[0]) return;
                const slideWidth = this.medias[0].itemWidth;
                
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    initAudio();
                    this.resetInactivityTimer();
                    const currentIdx = Math.round(this.scroll.target / slideWidth);
                    this.scroll.target = (currentIdx + 1) * slideWidth;
                } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    initAudio();
                    this.resetInactivityTimer();
                    const currentIdx = Math.round(this.scroll.target / slideWidth);
                    this.scroll.target = (currentIdx - 1) * slideWidth;
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const centered = this.getCenteredItem();
                    if (centered && centered.url) {
                        window.location.href = centered.url;
                    }
                }
            }
            onWheel(e) {
                initAudio();
                this.resetInactivityTimer();
                const delta = e.deltaY || e.wheelDelta || e.detail;
                this.scroll.target += (delta > 0 ? this.scrollSpeed : -this.scrollSpeed) * 0.2;
                this.onCheckDebounce();
            }
            onCheck() {
                if (!this.medias || !this.medias[0]) return;
                const slideWidth = this.medias[0].itemWidth;
                const itemIndex = Math.round(Math.abs(this.scroll.target) / slideWidth);
                const item = slideWidth * itemIndex;
                this.scroll.target = this.scroll.target < 0 ? -item : item;
            }
            getCenteredItem() {
                if (!this.medias || !this.medias[0]) return null;
                const slideWidth = this.medias[0].itemWidth;
                let itemIndex = Math.round(this.scroll.target / slideWidth);
                let normalizedIndex = ((itemIndex % this.mediasImages.length) + this.mediasImages.length) % this.mediasImages.length;
                return this.mediasImages[normalizedIndex];
            }
            onResize() {
                this.screen = { width: this.container.clientWidth, height: this.container.clientHeight };
                this.renderer.setSize(this.screen.width, this.screen.height);
                this.camera.perspective({ aspect: this.screen.width / this.screen.height });
                const fov = (this.camera.fov * Math.PI) / 180;
                const height = 2 * Math.tan(fov / 2) * this.camera.position.z;
                const width = height * this.camera.aspect;
                this.viewport = { width, height };
                if (this.medias) {
                    this.medias.forEach(media => media.onResize({ screen: this.screen, viewport: this.viewport }));
                }
            }
            update() {
                if (this.isAutoScrolling) {
                    this.scroll.target += 0.1; // Auto-scroll speed
                }
                this.scroll.current = lerp(this.scroll.current, this.scroll.target, this.scroll.ease);
                const scrollDir = this.scroll.current > this.scroll.last ? 'right' : 'left';
                
                if (this.medias) {
                    for (let m of this.medias) {
                        m.update(this.scroll, scrollDir);
                    }
                }
                
                this.renderer.render({ scene: this.scene, camera: this.camera });
                this.scroll.last = this.scroll.current;
                
                // Update the centered game title display dynamically
                const centeredItem = this.getCenteredItem();
                if (centeredItem && centeredItem.text) {
                    const titleEl = document.getElementById('selected-game-title');
                    if (titleEl && titleEl.innerText !== centeredItem.text) {
                        titleEl.innerText = centeredItem.text;
                    }
                }
                
                this.raf = window.requestAnimationFrame(this.update.bind(this));
            }
            addEventListeners() {
                this.boundOnResize = this.onResize.bind(this);
                this.boundOnWheel = this.onWheel.bind(this);
                this.boundOnTouchDown = this.onTouchDown.bind(this);
                this.boundOnTouchMove = this.onTouchMove.bind(this);
                this.boundOnTouchUp = this.onTouchUp.bind(this);
                this.boundOnKeyDown = this.onKeyDown.bind(this);
                window.addEventListener('resize', this.boundOnResize);
                window.addEventListener('mousewheel', this.boundOnWheel);
                window.addEventListener('wheel', this.boundOnWheel);
                window.addEventListener('keydown', this.boundOnKeyDown);
                
                this.container.addEventListener('mousedown', this.boundOnTouchDown);
                window.addEventListener('mousemove', this.boundOnTouchMove);
                window.addEventListener('mouseup', this.boundOnTouchUp);
                this.container.addEventListener('touchstart', this.boundOnTouchDown, { passive: false });
                window.addEventListener('touchmove', this.boundOnTouchMove, { passive: false });
                window.addEventListener('touchend', this.boundOnTouchUp);
            }
        }

        // Setup the specific games
        const gameItems = [
            { image: 'images/simon-says.jpg', text: 'Simon Says', url: 'SimonSays.html' },
            { image: 'images/hammer-shield.jpg', text: 'Hammer & Shield', url: 'HammerShield.html' },
            { image: 'images/wobble-ball.jpg', text: 'Wobble Ball', url: 'wabbleball.html' },
            { image: 'images/color-sort.jpg', text: 'Color Sort', url: 'ColorSort.html' },
            { image: 'images/orbit-pop.jpg', text: 'Orbit Pop', url: 'OrbitPop.html' }
        ];

        const container = document.getElementById('gallery-container');
        const galleryApp = new App(container, {
            items: gameItems,
            bend: 1,
            textColor: '#ffffff',
            borderRadius: 0.05,
            font: 'bold 40px "Segoe UI", sans-serif',
            scrollSpeed: 2.1,
            scrollEase: 0.07
        });

        galleryApp.resetInactivityTimer(); // Start the inactivity timer

        // Play Button Hookup
        document.getElementById('play-btn').addEventListener('click', () => {
            const centered = galleryApp.getCenteredItem();
            if (centered && centered.url) {
                window.location.href = centered.url;
            }
        });
    </script>
