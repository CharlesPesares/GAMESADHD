<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-text {
            color: white;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.4);
            animation: float 5s ease-in-out infinite;
            text-align: center;
            transition: color 0.3s ease, text-shadow 0.3s ease, letter-spacing 0.3s ease;
        }
        .welcome-text:hover {
            color: #fbc2eb;
            text-shadow: 0 0 20px rgba(251, 194, 235, 0.8), 0 4px 8px rgba(0,0,0,0.4);
            letter-spacing: 3px;
        }
        .dashboard-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            max-width: 1200px;
        }
        .card {
            width: 220px;
            height: 300px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: float 6s ease-in-out infinite;
            transition: filter 0.3s, transform 0.3s, scale 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            filter: brightness(1.1);
            cursor: pointer;
            scale: 1.05;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .card h2 {
            color: white;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 1.8rem;
        }
        /* Staggered floating animations and unique gradients for each card */
        .card:nth-child(1) { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); animation-delay: 0s; }
        .card:nth-child(2) { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); animation-delay: 1.5s; }
        .card:nth-child(3) { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); animation-delay: 3s; }
        .card:nth-child(4) { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); animation-delay: 4.5s; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <h1 class="welcome-text">Your brain's playground awaits!!</h1>
    <div class="dashboard-container">
        <a href="SimonSays.html" class="card">
            <h2>Simon Says</h2>
        </a>
        <a href="HammerShield.html" class="card">
            <h2>Hammer & Shield</h2>
        </a>
        <a href="#" class="card">
            <h2>Focus Quest</h2>
        </a>
        <a href="#" class="card">
            <h2>Pattern Puzzle</h2>
        </a>
    </div>
</body>
</html>
