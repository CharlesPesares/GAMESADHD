<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Sort</title>
    <style>
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .back-link {
            color: #a6c1ee;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            transition: color 0.3s;
            margin-bottom: 15px;
        }

        .back-link:hover {
            color: #fbc2eb;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 600px;
            margin-bottom: 30px;
            background: #1a252f;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            box-sizing: border-box;
        }

        .level-info-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .level-info h2 {
            margin: 0;
            color: #fbc2eb;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .level-select {
            background: #2c3e50;
            color: #a6c1ee;
            border: 2px solid #34495e;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .level-select:hover {
            border-color: #a6c1ee;
        }

        .level-select option {
            background: #1a252f;
            color: white;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 20px;
            color: #1a252f;
            cursor: pointer;
            box-shadow: 0 4px 0 #d67d81, 0 10px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d67d81, 0 5px 10px rgba(0,0,0,0.3);
        }

        .tubes-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 60px 25px; /* Wider gap to allow pouring animations above the tubes */
            max-width: 900px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .tube {
            width: 70px;
            height: 270px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: none;
            border-radius: 0 0 35px 35px;
            display: flex;
            flex-direction: column-reverse; /* Stacks items from bottom to top */
            align-items: center;
            gap: 5px;
            padding: 6px;
            padding-top: 40px; /* Space inside top of tube */
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.15));
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }

        .tube:hover {
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-5px);
        }

        .tube::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.5);
        }

        .tube.finished {
            animation: solidGlow 2s ease-in-out infinite;
            border-color: var(--glow-color);
        }

        .tube.just-finished {
            animation: tubeFinishAnim 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), solidGlow 2s ease-in-out infinite;
        }

        @keyframes tubeFinishAnim {
            0% { transform: translateY(0) scale(1); filter: brightness(1); }
            40% { transform: translateY(-15px) scale(1.05); filter: brightness(1.5); }
            100% { transform: translateY(0) scale(1); filter: brightness(1); }
        }

        @keyframes solidGlow {
            0%   { box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--glow-color); }
            50%  { box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4), 0 0 35px var(--glow-color); }
            100% { box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--glow-color); }
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,0.4), 0 5px 10px rgba(0,0,0,0.4);
        }

        .ball.selected {
            transform: translateY(-40px);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,0.6), 0 15px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        /* Win Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay h2 {
            font-size: 4rem;
            color: #a6c1ee;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #a6c1ee;
            text-align: center;
        }

        .next-btn {
            background: linear-gradient(135deg, #a6c1ee 0%, #fbc2eb 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 30px;
            color: #1a252f;
            cursor: pointer;
            box-shadow: 0 6px 0 #8fa7d4, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8fa7d4, 0 5px 10px rgba(0,0,0,0.4);
        }

        /* Particle Explosion Effect */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101; /* Shows up above the dark overlay */
            animation: explode 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.4), 0 2px 5px rgba(0,0,0,0.3);
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="gamedashboard.html" class="back-link">← Back to Dashboard</a>
        <h1>Color Sort</h1>
    </div>

    <div class="level-info">
        <div class="level-info-left">
            <h2 id="level-display">Level 1</h2>
            <select id="level-selector" class="level-select" onchange="jumpToLevel(this.value)"></select>
        </div>
        <button class="restart-btn" onclick="restartLevel()">Restart Level</button>
    </div>

    <div id="tubes-container" class="tubes-container"></div>

    <div class="overlay" id="overlay">
        <h2 id="overlay-title">Level Cleared!</h2>
        <button class="next-btn" id="overlay-btn" onclick="nextLevel()">NEXT LEVEL</button>
    </div>

    <script>
        // Vibrant 3D Gradients mapped to colors
        const COLORS = [
            { bg: "radial-gradient(circle at 30% 30%, #ff7675, #d63031)", glow: "#ff7675" }, // Red
            { bg: "radial-gradient(circle at 30% 30%, #74b9ff, #0984e3)", glow: "#74b9ff" }, // Blue
            { bg: "radial-gradient(circle at 30% 30%, #55efc4, #00b894)", glow: "#55efc4" }, // Green
            { bg: "radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e)", glow: "#ffeaa7" }, // Yellow
            { bg: "radial-gradient(circle at 30% 30%, #a29bfe, #6c5ce7)", glow: "#a29bfe" }, // Purple
            { bg: "radial-gradient(circle at 30% 30%, #fab1a0, #e17055)", glow: "#fab1a0" }, // Orange
            { bg: "radial-gradient(circle at 30% 30%, #81ecec, #00cec9)", glow: "#81ecec" }, // Teal
            { bg: "radial-gradient(circle at 30% 30%, #fd79a8, #e84393)", glow: "#fd79a8" }, // Pink
            { bg: "radial-gradient(circle at 30% 30%, #636e72, #2d3436)", glow: "#636e72" }, // Dark Blue
            { bg: "radial-gradient(circle at 30% 30%, #e1b12c, #c23616)", glow: "#e1b12c" }, // Brown
            { bg: "radial-gradient(circle at 30% 30%, #badc58, #6ab04c)", glow: "#badc58" }, // Lime
            { bg: "radial-gradient(circle at 30% 30%, #e056fd, #be2edd)", glow: "#e056fd" }  // Magenta
        ];

        // Automatically import legacy 'Block Sort' progress if no 'Color Sort' save exists
        let savedLevel = localStorage.getItem('colorSortLevel') || localStorage.getItem('blockSortLevel');
        let currentLevel = savedLevel ? parseInt(savedLevel) : 1;
        let maxLevel = localStorage.getItem('colorSortMaxLevel') ? parseInt(localStorage.getItem('colorSortMaxLevel')) : currentLevel;
        
        let tubes = [];
        let initialTubes = []; // Saves the starting state of the level to allow restarting
        let selectedTubeIndex = -1;
        let isPlaying = true;
        let isAnimating = false; // Prevents clicking during the pouring animation
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function updateLevelSelector() {
            const selector = document.getElementById('level-selector');
            selector.innerHTML = '';
            for (let i = 1; i <= maxLevel; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = 'Jump to Level ' + i;
                if (i === currentLevel) opt.selected = true;
                selector.appendChild(opt);
            }
        }

        function jumpToLevel(levelVal) {
            currentLevel = parseInt(levelVal);
            localStorage.setItem('colorSortLevel', currentLevel);
            loadLevel(currentLevel);
        }

        // Procedurally generate a solvable level layout by shuffling it backward from a solved state
        function generateLevel(level) {
            // Difficulty scales up quickly: adds a new color every 3 levels until it hits max 12
            let numColors = Math.min(12, 2 + Math.floor((level - 1) / 3));
            let numEmpty = 2; // Always keep 2 empty tubes to ensure playability
            let capacity = 4;
            let state = [];

            // Loop until we generate a state that isn't already solved
            do {
                state = [];
                for (let c = 0; c < numColors; c++) {
                    let tube = [];
                    for (let i = 0; i < capacity; i++) tube.push(c);
                    state.push(tube);
                }
                for (let e = 0; e < numEmpty; e++) {
                    state.push([]);
                }

                let scrambleMoves = 40 + level * 5; 
                let lastSource = -1;
                let lastDest = -1;

                for (let i = 0; i < scrambleMoves; i++) {
                    let validSources = [];
                    for (let t = 0; t < state.length; t++) {
                        if (state[t].length > 0) validSources.push(t);
                    }
                    if (validSources.length === 0) break;
                    
                    let source = validSources[Math.floor(Math.random() * validSources.length)];

                    let validDests = [];
                    for (let t = 0; t < state.length; t++) {
                        if (state[t].length < capacity && t !== source) {
                            // Try to prevent immediate undo to get a deeper shuffle
                            if (!(source === lastDest && t === lastSource)) {
                                validDests.push(t);
                            }
                        }
                    }

                    if (validDests.length === 0) {
                        for (let t = 0; t < state.length; t++) {
                            if (state[t].length < capacity && t !== source) {
                                validDests.push(t);
                            }
                        }
                    }

                    if (validDests.length > 0) {
                        let dest = validDests[Math.floor(Math.random() * validDests.length)];
                        state[dest].push(state[source].pop());
                        lastSource = source;
                        lastDest = dest;
                    }
                }
            } while(isSolved(state));

            return state;
        }

        function isSolved(state) {
            for (let tube of state) {
                if (tube.length === 0) continue;
                if (tube.length !== 4) return false;
                const c = tube[0];
                for (let x of tube) if (x !== c) return false;
            }
            return true;
        }

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'select') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'finished') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(500, now + 0.1);
                osc.frequency.setValueAtTime(600, now + 0.2);
                osc.frequency.setValueAtTime(800, now + 0.3);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.setValueAtTime(0.3, now + 0.4);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function render() {
            const container = document.getElementById('tubes-container');
            container.innerHTML = '';
            
            tubes.forEach((tube, index) => {
                const tubeEl = document.createElement('div');
                tubeEl.className = 'tube';
                tubeEl.onclick = () => handleTubeClick(index);
                
                const isFinished = tube.length === 4 && tube.every(x => x === tube[0]);
                if (isFinished) {
                    tubeEl.style.setProperty('--glow-color', COLORS[tube[0]].glow);
                    tubeEl.classList.add('finished');
                    if (!finishedTubes[index]) {
                        tubeEl.classList.add('just-finished');
                        finishedTubes[index] = true;
                    }
                } else {
                    finishedTubes[index] = false;
                }

                tube.forEach((colorIdx, ballIdx) => {
                    const ballEl = document.createElement('div');
                    ballEl.className = 'ball';
                    ballEl.style.background = COLORS[colorIdx].bg;
                    
                    if (index === selectedTubeIndex && ballIdx === tube.length - 1) {
                        ballEl.classList.add('selected');
                    }
                    
                    tubeEl.appendChild(ballEl);
                });
                
                container.appendChild(tubeEl);
            });
        }

        function animateTransfer(sourceIdx, destIdx, callback) {
            const container = document.getElementById('tubes-container');
            const sourceTubeEl = container.children[sourceIdx];
            const destTubeEl = container.children[destIdx];
            const sourceBallEl = sourceTubeEl.lastElementChild;
            
            // Create dummy ball in destination to get target coordinates
            const dummyBall = document.createElement('div');
            dummyBall.className = 'ball';
            dummyBall.style.visibility = 'hidden';
            destTubeEl.appendChild(dummyBall);
            
            const startRect = sourceBallEl.getBoundingClientRect();
            const endRect = dummyBall.getBoundingClientRect();
            
            // Create floating animated ball
            const animatedBall = sourceBallEl.cloneNode(true);
            animatedBall.classList.remove('selected');
            animatedBall.style.position = 'fixed';
            animatedBall.style.left = startRect.left + 'px';
            animatedBall.style.top = startRect.top + 'px';
            animatedBall.style.margin = '0';
            animatedBall.style.zIndex = '1000';
            animatedBall.style.transition = 'none';
            animatedBall.style.transform = 'none';
            
            document.body.appendChild(animatedBall);
            sourceBallEl.style.visibility = 'hidden'; // Hide original
            
            // Peak height slightly above the tallest tube
            const peakY = Math.min(sourceTubeEl.getBoundingClientRect().top, destTubeEl.getBoundingClientRect().top) - 60;
            
            animatedBall.getBoundingClientRect(); // Force reflow to prepare transition
            
            const speed = 120; // Ms per phase
            
            // Phase 1: Move UP out of the tube
            animatedBall.style.transition = `top ${speed}ms ease-out, left ${speed}ms linear`;
            animatedBall.style.top = peakY + 'px';
            
            setTimeout(() => {
                // Phase 2: Move ACROSS to the target tube
                animatedBall.style.transition = `top ${speed}ms linear, left ${speed}ms ease-in-out`;
                animatedBall.style.left = endRect.left + 'px';
                
                setTimeout(() => {
                    // Phase 3: Move DOWN into the target tube
                    animatedBall.style.transition = `top ${speed}ms ease-in, left ${speed}ms linear`;
                    animatedBall.style.top = endRect.top + 'px';
                    
                    setTimeout(() => {
                        // Cleanup and trigger logical update
                        dummyBall.remove();
                        animatedBall.remove();
                        callback();
                    }, speed);
                }, speed);
            }, speed);
        }

        function handleTubeClick(index) {
            if (!isPlaying || isAnimating) return;

            if (selectedTubeIndex === -1) {
                if (tubes[index].length > 0) {
                    selectedTubeIndex = index;
                    playSound('select');
                    render();
                }
            } else {
                if (selectedTubeIndex === index) {
                    selectedTubeIndex = -1;
                    playSound('drop');
                    render();
                } else {
                    const sourceTube = tubes[selectedTubeIndex];
                    const destTube = tubes[index];
                    
                    if (destTube.length < 4) {
                        const ballColor = sourceTube[sourceTube.length - 1];
                        const destTopColor = destTube.length > 0 ? destTube[destTube.length - 1] : null;
                        
                        if (destTube.length === 0 || destTopColor === ballColor) {
                            isAnimating = true;
                            
                            // Animate before applying logical change
                            animateTransfer(selectedTubeIndex, index, () => {
                                destTube.push(sourceTube.pop());
                                selectedTubeIndex = -1;
                                
                                const isFinished = destTube.length === 4 && destTube.every(x => x === destTube[0]);
                                if (isFinished) {
                                    playSound('finished');
                                    const destTubeEl = document.getElementById('tubes-container').children[index];
                                    const rect = destTubeEl.getBoundingClientRect();
                                    createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 45);
                                } else {
                                    playSound('drop');
                                }
                                
                                render();
                                isAnimating = false;
                                
                                if (isSolved(tubes)) {
                                    isPlaying = false;
                                    setTimeout(() => {
                                        playSound('win');
                                        winLevel();
                                    }, 250);
                                } else if (!hasValidMoves()) {
                                    isPlaying = false;
                                    setTimeout(() => {
                                        showGameOver();
                                    }, 250);
                                }
                            });
                        } else {
                            selectedTubeIndex = index;
                            playSound('select');
                            render();
                        }
                    } else {
                        selectedTubeIndex = index;
                        playSound('select');
                        render();
                    }
                }
            }
        }

        function createExplosion(startX, startY, count = 80) {
            const centerX = startX !== undefined ? startX : window.innerWidth / 2;
            const centerY = startY !== undefined ? startY : window.innerHeight / 2;
            const particleCount = count;
            
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                
                // Pick a random vibrant color from the game's palette
                const colorObj = COLORS[Math.floor(Math.random() * COLORS.length)];
                p.style.background = colorObj.bg;
                
                // Randomize ball sizes slightly
                const size = Math.random() * 15 + 10;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                
                p.style.left = (centerX - size/2) + 'px';
                p.style.top = (centerY - size/2) + 'px';
                
                // Randomize burst direction and distance
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 400 + 50;
                p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(p);
                
                // Cleanup the DOM after the animation finishes
                setTimeout(() => p.remove(), 1200);
            }
        }

    function hasValidMoves() {
        for (let i = 0; i < tubes.length; i++) {
            if (tubes[i].length === 0) continue; // Skip empty tubes
            
            // If a tube is fully sorted, we don't need to move balls out of it
            if (tubes[i].length === 4 && tubes[i].every(x => x === tubes[i][0])) continue;

            const sourceTopColor = tubes[i][tubes[i].length - 1];
            const isOnlyOneColor = tubes[i].every(x => x === sourceTopColor);

            for (let j = 0; j < tubes.length; j++) {
                if (i === j) continue;

                if (tubes[j].length === 0) {
                    // Moving a uniform stack to an empty tube is just shifting the problem, not a real escape
                    if (!isOnlyOneColor) return true;
                } else if (tubes[j].length < 4) {
                    if (tubes[j][tubes[j].length - 1] === sourceTopColor) return true;
                }
            }
        }
        return false; // No empty tubes, and no matching tops with space!
    }

    function showGameOver() {
        document.getElementById('overlay-title').innerText = "Out of Moves!";
        document.getElementById('overlay-title').style.color = "#ff4c4c";
        const btn = document.getElementById('overlay-btn');
        btn.innerText = "RESTART LEVEL";
        btn.onclick = restartLevel;
        document.getElementById('overlay').style.display = 'flex';
    }

        function winLevel() {
            createExplosion();
            let beatGame = false;
            if (currentLevel === 100) {
                beatGame = true;
                currentLevel = 1;
            } else {
                currentLevel++;
            }
            
            maxLevel = Math.max(maxLevel, currentLevel);
            localStorage.setItem('colorSortLevel', currentLevel);
            localStorage.setItem('colorSortMaxLevel', maxLevel);
            
            document.getElementById('overlay-title').innerText = beatGame ? "You Beat All 100 Levels!" : "Level Cleared!";
            document.getElementById('overlay-title').style.color = "#a6c1ee";
            
            const btn = document.getElementById('overlay-btn');
            btn.innerText = beatGame ? "PLAY AGAIN" : "NEXT LEVEL";
            btn.onclick = nextLevel;
            
            document.getElementById('overlay').style.display = 'flex';
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            loadLevel(currentLevel);
        }

        function restartLevel() {
            if (!isPlaying && isSolved(tubes)) return; // Prevent restarting during the win overlay
            if (isAnimating) return; // Prevent restarting mid-animation
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('overlay-title').style.color = "#a6c1ee";
            document.getElementById('overlay-btn').onclick = nextLevel;
            
            tubes = initialTubes.map(tube => [...tube]);
            finishedTubes = new Array(tubes.length).fill(false);
            selectedTubeIndex = -1;
            isPlaying = true;
            render();
        }

        function loadLevel(level) {
            tubes = generateLevel(level);
            initialTubes = tubes.map(tube => [...tube]);
            finishedTubes = new Array(tubes.length).fill(false);
            selectedTubeIndex = -1;
            isPlaying = true;
            document.getElementById('level-display').innerText = `Level ${level}`;
            updateLevelSelector();
            render();
        }

        window.onload = () => loadLevel(currentLevel);

    </script>
</body>
</html>
